<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>时间记录器</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f0f4ff;
  --card: #ffffff;
  --text: #1e293b;
  --sub: #64748b;
  --border: #e2e8f0;
  --primary: #6366f1;
  --radius: 16px;
  --shadow: 0 2px 16px rgba(99,102,241,0.10);
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  padding-bottom: 90px;
}
.header {
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
  padding: 20px 20px 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(99,102,241,0.3);
}
.header h1 { font-size: 20px; font-weight: 700; color: white; display: flex; align-items: center; gap: 8px; }
.header .date { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 4px; }

.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; border-top: 1px solid var(--border);
  display: flex; z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 08px; font-size: 11px; color: #94a3b8;
  cursor: pointer; border: none; background: none; gap: 4px; transition: color 0.2s;
}
.nav-btn.active { color: var(--primary); }
.nav-btn .nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }

.page { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
.page.active { display: block; }

.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.card-title { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }

/* 计时卡片 */
.running-card {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white; border-radius: var(--radius); padding: 24px 20px;
  margin-bottom: 12px; box-shadow: 0 8px 30px rgba(99,102,241,0.4);
  position: relative; overflow: hidden;
}
.running-card::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 120px; height: 120px; background: rgba(255,255,255,0.08); border-radius: 50%;
}
.running-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.2); border-radius: 20px;
  padding: 4px 10px; font-size: 12px; margin-bottom: 12px;
}
.running-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
.running-cat { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
.running-time { font-size: 52px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 3px; line-height: 1; margin-bottom: 8px; }
.running-start { font-size: 12px; opacity: 0.75; }
.stop-btn {
  margin-top: 18px; background: rgba(255,255,255,0.2);
  border: 1.5px solid rgba(255,255,255,0.5); color: white;
  padding: 13px; border-radius: 14px; font-size: 15px; font-weight: 600;
  width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.stop-btn:active { background: rgba(255,255,255,0.35); }

/* 分类网格 */
.cats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.cat-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 8px 12px; border-radius: 16px; border: none;
  cursor: pointer; transition: transform 0.15s; background: var(--bg);
}
.cat-btn:active { transform: scale(0.92); }
.cat-icon { font-size: 28px; margin-bottom: 6px; }
.cat-name { font-size: 12px; font-weight: 600; }

/* 表单 */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--sub); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 15px; background: var(--bg);
  color: var(--text); outline: none; transition: border-color 0.2s; -webkit-appearance: none;
}
.form-input:focus { border-color: var(--primary); background: white; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-primary {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white; border: none; border-radius: 14px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  box-shadow: 0 4px 14px rgba(99,102,241,0.35); transition: opacity 0.2s, transform 0.15s;
}
.btn-primary:active { opacity: 0.88; transform: scale(0.98); }

/* 历史 */
.record-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.record-item:last-child { border-bottom: none; }
.record-dot { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.record-info { flex: 1; min-width: 0; }
.record-cat { font-size: 14px; font-weight: 600; }
.record-time { font-size: 12px; color: var(--sub); margin-top: 2px; }
.record-note { font-size: 12px; color: var(--sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.record-dur { font-size: 13px; font-weight: 700; color: var(--primary); flex-shrink: 0; }
.record-actions { display: flex; gap: 4px; }
.btn-icon { background: var(--bg); border: none; cursor: pointer; padding: 6px; border-radius: 10px; font-size: 15px; transition: background 0.15s; }
.btn-icon:active { background: var(--border); }

/* 统计 */
.stat-tabs { display: flex; background: white; border-radius: 14px; padding: 4px; margin-bottom: 16px; box-shadow: var(--shadow); }
.stat-tab { flex: 1; text-align: center; padding: 9px 4px; border-radius: 11px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--sub); border: none; background: none; transition: all 0.2s; }
.stat-tab.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; box-shadow: 0 3px 10px rgba(99,102,241,0.35); }
.stat-summary { display: grid; grid-template-columns:1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: white; border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
.stat-val { font-size: 26px; font-weight: 800; color: var(--primary); }
.stat-lbl { font-size: 11px; color: var(--sub); margin-top: 3px; font-weight: 500; }

.chart-wrap { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
.chart-title { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.chart-inner { height: 180px; position: relative; }

.pie-wrap { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
.pie-inner { height: 200px; position: relative; margin-bottom: 4px; }

/* 分类详情可折叠 */
.cat-stat-item { border-bottom: 1px solid var(--border); }
.cat-stat-item:last-child { border-bottom: none; }
.cat-stat-header { display: flex; align-items: center; gap: 10px; padding: 12px 0; cursor: pointer; }
.cat-stat-header:active { opacity: 0.7; }
.cat-stat-bar-wrap { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.cat-stat-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.cat-stat-time { font-size: 12px; font-weight: 700; color: var(--sub); min-width: 52px; text-align: right; }
.cat-stat-arrow { font-size: 12px; color: var(--sub); transition: transform 0.2s; flex-shrink: 0; }
.cat-stat-arrow.open { transform: rotate(90deg); }

/* 备注子统计 */
.note-stats { display: none; background: var(--bg); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.note-stats.open { display: block; }
.note-chart-wrap { height: 160px; position: relative; margin-bottom: 8px; }
.note-stat-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.note-stat-item:last-child { border-bottom: none; }
.note-stat-label { font-size: 12px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-stat-bar-wrap { width: 80px; height: 5px; background: white; border-radius: 3px; overflow: hidden; }
.note-stat-bar { height: 100%; border-radius: 3px; }
.note-stat-time { font-size: 11px; font-weight: 700; color: var(--sub); min-width: 44px; text-align: right; }

/* 导出 */
.export-btn { display: flex; align-items: center; gap: 14px; padding: 16px; background: white; border-radius: 14px; border: none; width: 100%; cursor: pointer; margin-bottom: 10px; box-shadow: var(--shadow); transition: transform 0.15s; }
.export-btn:active { transform: scale(0.98); }
.export-icon { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.export-name { font-size: 15px; font-weight: 600; text-align: left; }
.export-desc { font-size: 12px; color: var(--sub); margin-top: 2px; text-align: left; }

/* Toast */
.toast {
  position: fixed; top: 24px; left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: #1e293b; color: white; padding: 12px 22px;
  border-radius: 14px; font-size: 14px; font-weight: 500;
  z-index: 9999; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}
.toast.show { transform: translateX(-50%) translateY(0); }

.empty { text-align: center; padding: 40px 20px; color: var(--sub); }
.empty-icon { font-size: 44px; margin-bottom: 10px; }
.empty p { font-size: 14px; }
.loading { text-align: center; padding: 30px; color: var(--sub); font-size: 14px; }

/* 模态框 */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(2px); }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal { background: white; border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%; max-height: 88vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1); }
.modal-overlay.show .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 18px; font-weight: 700; }
.modal-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--sub); }
select.form-input { appearance: none; -webkit-appearance: none; }

/* 分类管理项 */
.cat-manage-item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.cat-manage-item:last-child { border-bottom: none; }
.cat-manage-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.cat-manage-name { flex: 1; font-size: 14px; font-weight: 600; }
.cat-manage-actions { display: flex; gap: 4px; }

/* 自动填充提示 */
.fill-tip { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border: 1px solid #86efac; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; color: #166534; display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    时间记录器
  </h1>
  <div class="date" id="headerDate"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 首页 -->
<div class="page active" id="page-home">
  <div id="runningCard"></div>
  <div class="card">
    <div class="card-title">⚡ 快速开始</div>
    <div class="cats-grid" id="catsGrid"></div>
  </div>
  <div class="card">
    <div class="card-title">✏️ 手动添加</div>
    <div class="form-group">
      <label class="form-label">日期</label>
      <input type="date" class="form-input" id="fDate">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">开始时间</label>
        <input type="time" class="form-input" id="fStart">
      </div>
      <div class="form-group">
        <label class="form-label">结束时间</label>
        <input type="time" class="form-input" id="fEnd">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">分类</label>
      <select class="form-input" id="fCat"></select>
    </div>
    <div class="form-group">
      <label class="form-label">备注（可选）</label>
      <input type="text" class="form-input" id="fNote" placeholder="备注内容">
    </div>
    <button class="btn-primary" onclick="addRecord()">添加记录</button>
  </div>
</div>

<!-- 历史 -->
<div class="page" id="page-history">
  <div class="card" style="padding:14px 16px;">
    <input type="date" class="form-input" id="historyDate" style="border:none;padding:4px 0;background:transparent;font-size:16px;font-weight:700;color:var(--text);">
  </div>
  <div id="fillTip"></div>
  <div id="historyList"></div>
</div>

<!-- 统计 -->
<div class="page" id="page-stats">
  <div class="stat-tabs">
    <button class="stat-tab active" onclick="switchStatTab('day',this)">今日</button>
    <button class="stat-tab" onclick="switchStatTab('week',this)">本周</button>
    <button class="stat-tab" onclick="switchStatTab('month',this)">本月</button>
    <button class="stat-tab" onclick="switchStatTab('year',this)">全年</button>
  </div>
  <div class="stat-summary">
    <div class="stat-card"><div class="stat-val" id="statTotal">0m</div><div class="stat-lbl">总时长</div></div>
    <div class="stat-card"><div class="stat-val" id="statCount">0</div><div class="stat-lbl">记录条数</div></div></div>
  <div class="chart-wrap">
    <div class="chart-title">📊 时间分布</div>
    <div class="chart-inner"><canvas id="barChart"></canvas></div>
  </div>
  <div class="pie-wrap">
    <div class="chart-title">🥧 分类占比</div>
    <div class="pie-inner"><canvas id="pieChart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">📋 分类详情（点击展开备注统计）</div>
    <div id="catStats"></div>
  </div>
</div>

<!-- 更多 -->
<div class="page" id="page-export">
  <div class="card">
    <div class="card-title">📤 导出数据</div>
    <button class="export-btn" onclick="exportCSV()">
      <div class="export-icon" style="background:#dcfce7;">📊</div>
      <div><div class="export-name">导出 CSV</div><div class="export-desc">可用Excel / Numbers打开</div></div>
    </button>
    <button class="export-btn" onclick="exportJSON()">
      <div class="export-icon" style="background:#dbeafe;">📋</div>
      <div><div class="export-name">导出 JSON</div><div class="export-desc">完整数据备份</div></div>
    </button>
  </div>
  <div class="card">
    <div class="card-title">🏷️ 管理分类</div>
    <div id="catManageList"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <input type="text" class="form-input" id="newCatName" placeholder="分类名称" style="flex:1;">
      <input type="text" class="form-input" id="newCatIcon" placeholder="图标" style="width:58px;text-align:center;">
      <input type="color" id="newCatColor" value="#6366f1" style="width:44px;height:44px;border:none;border-radius:12px;cursor:pointer;padding:3px;background:none;"></div>
    <button class="btn-primary" style="margin-top:12px;" onclick="addCategory()">+ 添加分类</button>
  </div>
</div>

<!-- 底部导航 -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchPage('home',this)">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>首页
  </button>
  <button class="nav-btn" onclick="switchPage('history',this)">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>历史
  </button>
  <button class="nav-btn" onclick="switchPage('stats',this)">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </div>统计
  </button>
  <button class="nav-btn" onclick="switchPage('export',this)">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 01014.14M4.93 4.93a10 10 0 000 14.14"/></svg>
    </div>更多
  </button>
</nav>

<!-- 编辑记录模态框 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">编辑记录</div>
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    </div>
    <div class="form-group"><label class="form-label">日期</label><input type="date" class="form-input" id="eDate"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">开始时间</label><input type="time" class="form-input" id="eStart"></div>
      <div class="form-group"><label class="form-label">结束时间</label><input type="time" class="form-input" id="eEnd"></div>
    </div>
    <div class="form-group"><label class="form-label">分类</label><select class="form-input" id="eCat"></select></div>
    <div class="form-group"><label class="form-label">备注</label><input type="text" class="form-input" id="eNote"></div>
    <button class="btn-primary" onclick="saveEdit()">保存修改</button>
  </div>
</div>

<!-- 编辑分类模态框 -->
<div class="modal-overlay" id="editCatModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">编辑分类</div>
      <button class="modal-close" onclick="closeModal('editCatModal')">✕</button>
    </div>
    <input type="hidden" id="editCatId">
    <div class="form-group"><label class="form-label">分类名称</label><input type="text" class="form-input" id="editCatName"></div>
    <div class="form-group"><label class="form-label">图标（emoji）</label><input type="text" class="form-input" id="editCatIcon" style="font-size:24px;text-align:center;"></div>
    <div class="form-group">
      <label class="form-label">颜色</label>
      <div style="display:flex;align-items:center;gap:12px;">
        <input type="color" id="editCatColor" style="width:48px;height:48px;border:none;border-radius:12px;cursor:pointer;padding:3px;background:none;">
        <span style="font-size:13px;color:var(--sub);">点击选择颜色</span>
      </div>
    </div>
    <button class="btn-primary" onclick="saveEditCat()">保存修改</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://buyrevhbxypsekpmctmj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_aDBUcvGvxxxyr1XS37JX3g_WnE3s6x-';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let categories = [];
let runningRecord = null;
let timerInterval = null;
let startTimestamp = null;
let currentStatTab = 'day';
let editingId = null;
let barChartInstance = null;
let pieChartInstance = null;
const noteChartInstances = {};

// ===== 工具函数 =====
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function nowTimeStr() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
function formatDateCN(d) {
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${days[d.getDay()]}`;
}
function fmtDur(mins) {
  if (mins === null || mins === undefined || isNaN(mins)) return '-';
  mins = Math.max(0, Math.round(mins));
  if (mins < 60) return `${mins}分钟`;
  const h = Math.floor(mins/60), m = mins%60;
  return m ? `${h}h ${m}m` : `${h}h`;
}
function fmtTime(t) { return t ? t.slice(0,5) : '--:--'; }
function calcMins(start, end) {
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  return (eh*60+em)-(sh*60+sm);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ===== 计时器 =====
async function checkRunning() {
  const { data } = await sb.from('records').select('*').eq('is_running', true).maybeSingle();
  if (data) {
    runningRecord = data;
    const [sh, sm] = data.start_time.slice(0,5).split(':').map(Number);
    const startDate = new Date(data.date +'T00:00:00');
    startDate.setHours(sh, sm, 0, 0);
    startTimestamp = startDate.getTime();
    startTimer();
  }
}
async function quickStart(catId) {
  if (runningRecord) { showToast('⚠️ 请先停止当前计时'); return; }
  const cat = categories.find(c => c.id === catId);
  const now = new Date();
  startTimestamp = now.getTime();
  const { data, error } = await sb.from('records').insert({
    date: toDateStr(now), start_time: nowTimeStr(),
    category_id: catId, category_name: cat.name, is_running: true
  }).select().single();
  if (error) { showToast('❌ 启动失败'); return; }
  runningRecord = data;
  startTimer();
  showToast(`▶️ 开始：${cat.icon} ${cat.name}`);
}
function startTimer() {
  clearInterval(timerInterval);
  renderRunning();
  timerInterval = setInterval(renderRunning, 1000);
}
function renderRunning() {
  const wrap = document.getElementById('runningCard');
  if (!runningRecord) { wrap.innerHTML = ''; return; }
  const cat = categories.find(c => c.id === runningRecord.category_id) || {};
  const elapsed = Math.max(0, Math.floor((Date.now() - startTimestamp) / 1000));
  const h = String(Math.floor(elapsed/3600)).padStart(2,'0');
  const m = String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
  const s = String(elapsed%60).padStart(2,'0');
  wrap.innerHTML = `
    <div class="running-card">
      <div class="running-badge"><div class="running-dot"></div>正在计时</div>
      <div class="running-cat">${cat.icon||'⏱'} ${runningRecord.category_name}</div>
      <div class="running-time">${h}:${m}:${s}</div>
      <div class="running-start">开始于${fmtTime(runningRecord.start_time)}</div>
      <button class="stop-btn" onclick="stopTimer()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        停止计时
      </button>
    </div>`;
}
async function stopTimer() {
  if (!runningRecord) return;
  clearInterval(timerInterval);
  const elapsed = Math.floor((Date.now() - startTimestamp) / 1000);
  const dur = Math.round(elapsed / 60);
  await sb.from('records').update({
    end_time: nowTimeStr(), duration_minutes: Math.max(0, dur), is_running: false
  }).eq('id', runningRecord.id);
  showToast(`✅ 已记录 ${fmtDur(dur)}`);
  runningRecord = null; startTimestamp = null;
  document.getElementById('runningCard').innerHTML = '';
}

// ===== 历史记录 =====
async function loadHistory() {
  const date = document.getElementById('historyDate').value;
  const list = document.getElementById('historyList');
  const tipEl = document.getElementById('fillTip');
  list.innerHTML = '<div class="loading">加载中...</div>';
  tipEl.innerHTML = '';

  const { data } = await sb.from('records').select('*')
    .eq('date', date).eq('is_running', false).order('start_time');

  //===== 功能1：自动填充"其他" =====
  const selectedDate = new Date(date + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const isYesterday = selectedDate < today;

  let filledRecords = data ? [...data] : [];
  let fillCount = 0;

  if (isYesterday && data) {
    const gaps = findGaps(data, '00:00', '23:59');
    if (gaps.length > 0) {
      fillCount = gaps.length;
      // 找到或创建"其他"分类
      let otherCat = categories.find(c => c.name === '其他');
      if (!otherCat) {
        const { data: newCat } = await sb.from('categories').insert({ name: '其他', icon: '⬜', color: '#94a3b8' }).select().single();
        if (newCat) { categories.push(newCat); otherCat = newCat; }
      }
      if (otherCat) {
        for (const gap of gaps) {
          const dur = calcMins(gap.start, gap.end);
          if (dur > 0) {
            await sb.from('records').insert({
              date, start_time: gap.start, end_time: gap.end,
              duration_minutes: dur, category_id: otherCat.id,
              category_name: '其他', note: '自动填充', is_running: false
            });
          }
        }// 重新加载
        const { data: newData } = await sb.from('records').select('*')
          .eq('date', date).eq('is_running', false).order('start_time');
        filledRecords = newData || [];
        tipEl.innerHTML = `<div class="fill-tip">✅ 已自动用「其他」填充 ${fillCount} 段空白时间</div>`;
      }
    }
  }

  if (!filledRecords.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>这天暂无记录</p></div>';
    return;
  }
  list.innerHTML = `<div class="card">${filledRecords.map(r => {
    const cat = categories.find(c => c.id === r.category_id) || {};
    return `<div class="record-item">
      <div class="record-dot" style="background:${cat.color||'#6366f1'}20;">${cat.icon||'📌'}</div>
      <div class="record-info">
        <div class="record-cat">${r.category_name}</div>
        <div class="record-time">${fmtTime(r.start_time)} → ${fmtTime(r.end_time)}</div>
        ${r.note ? `<div class="record-note">💬 ${r.note}</div>` : ''}
      </div>
      <div class="record-dur">${fmtDur(r.duration_minutes)}</div>
      <div class="record-actions">
        <button class="btn-icon" onclick="openEdit('${r.id}')">✏️</button>
        <button class="btn-icon" onclick="deleteRecord('${r.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

//找出时间空隙
function findGaps(records, dayStart, dayEnd) {
  if (!records.length) return [{ start: dayStart, end: dayEnd }];
  const sorted = [...records].sort((a,b) => a.start_time.localeCompare(b.start_time));
  const gaps = [];
  let cursor = dayStart;
  for (const r of sorted) {
    const rStart = r.start_time.slice(0,5);
    if (rStart > cursor) gaps.push({ start: cursor, end: rStart });
    const rEnd = r.end_time ? r.end_time.slice(0,5) : rStart;
    if (rEnd > cursor) cursor = rEnd;
  }
  if (cursor < dayEnd) gaps.push({ start: cursor, end: dayEnd });
  return gaps;
}

function switchStatTab(tab, btn) {

  btn.classList.add('active');
  loadStats();

async function loadStats() {
  const now = new Date();
  let start, end;
  if (currentStatTab === 'day') {
    start = end = toDateStr(now);
  } else if (currentStatTab === 'week') {
    const d = new Date(now); d.setDate(d.getDate()-((d.getDay()+6)%7));
    start = toDateStr(d);
    const e = new Date(d); e.setDate(e.getDate()+6); end = toDateStr(e);
  } else if (currentStatTab === 'month') {
    start = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    end = toDateStr(new Date(now.getFullYear(), now.getMonth()+1, 0));
  } else {
    start = `${now.getFullYear()}-01-01`; end = `${now.getFullYear()}-12-31`;
  }

  const { data } = await sb.from('records').select('*')
    .gte('date', start).lte('date', end).eq('is_running', false);
  const records = data || [];
  const total = records.reduce((s,r) => s+(r.duration_minutes||0), 0);
  document.getElementById('statTotal').textContent = total ? fmtDur(total) : '0m';
  document.getElementById('statCount').textContent = records.length;

  // 分类汇总
  const catMap = {};
  records.forEach(r => {
    const cat = categories.find(c => c.id === r.category_id) || { name: r.category_name||'未知', color: '#6366f1', icon: '📌' };
    const key = r.category_id || r.category_name;
    if (!catMap[key]) catMap[key] = { cat, mins: 0, notes: {} };
    catMap[key].mins += r.duration_minutes||0;
    // 备注统计
    const noteKey = r.note && r.note.trim() ? r.note.trim() : '（无备注）';
    catMap[key].notes[noteKey] = (catMap[key].notes[noteKey]||0) + (r.duration_minutes||0);
  });
  const catArr = Object.values(catMap).sort((a,b) => b.mins - a.mins);
  const maxMins = catArr[0]?.mins || 1;

  //===== 功能2：分类详情 + 备注统计 =====
  document.getElementById('catStats').innerHTML = catArr.length
    ? catArr.map(({cat, mins, notes}, idx) => {
        const noteArr = Object.entries(notes).sort((a,b) => b[1]-a[1]);
        const hasNotes = noteArr.some(([k]) => k !== '（无备注）') || noteArr.length > 1;
        return `
        <div class="cat-stat-item">
          <div class="cat-stat-header" onclick="toggleNoteStats('ns-${idx}','arr-${idx}')">
            <span style="font-size:20px;width:28px;text-align:center;">${cat.icon}</span>
            <span style="font-size:13px;font-weight:600;min-width:48px;color:${cat.color};">${cat.name}</span><div class="cat-stat-bar-wrap">
              <div class="cat-stat-bar" style="width:${(mins/maxMins*100).toFixed(1)}%;background:${cat.color};"></div>
            </div>
            <span class="cat-stat-time">${fmtDur(mins)}</span><span class="cat-stat-arrow" id="arr-${idx}">▶</span>
          </div>
          <div class="note-stats" id="ns-${idx}">
            <div class="note-chart-wrap"><canvas id="nc-${idx}"></canvas></div>
            ${noteArr.map(([k,v]) => `
              <div class="note-stat-item">
                <span class="note-stat-label">${k}</span>
                <div class="note-stat-bar-wrap">
                  <div class="note-stat-bar" style="width:${(v/mins*100).toFixed(1)}%;background:${cat.color};"></div>
                </div>
                <span class="note-stat-time">${fmtDur(v)}</span></div>`).join('')}
          </div>
        </div>`;}).join('')
    : '<div class="empty"><p>暂无数据</p></div>';

  // 预存noteArr 数据供图表使用
  window._catStatData = catArr;

  // 饼状图
  if (pieChartInstance) { pieChartInstance.destroy(); pieChartInstance = null; }
  const pieCanvas = document.getElementById('pieChart');
  if (catArr.length && total > 0) {
    pieChartInstance = new Chart(pieCanvas, {
      type: 'doughnut',
      data: {
        labels: catArr.map(({cat}) => `${cat.icon} ${cat.name}`),
        datasets: [{ data: catArr.map(({mins}) => mins), backgroundColor: catArr.map(({cat}) => cat.color), borderWidth: 3, borderColor: '#fff', hoverOffset: 10 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '62%',
        plugins: {
          legend: { position: 'bottom', labels: { font: { size: 11, weight: '600' }, padding: 14, boxWidth: 10, boxHeight: 10, usePointStyle: true, pointStyle: 'circle' } },
          tooltip: { callbacks: { label: ctx => `  ${fmtDur(ctx.raw)}（${total>0?(ctx.raw/total*100).toFixed(1):0}%）` } }
        }
      }
    });
  }

  //柱状图
  let chartLabels = [], chartData = [], chartColors = [];
  if (currentStatTab === 'day') {
    const hourMap = {};
    records.forEach(r => { const h = parseInt(r.start_time.slice(0,2)); hourMap[h] = (hourMap[h]||0)+(r.duration_minutes||0); });
    for (let i=6;i<=23;i++) { chartLabels.push(`${i}`); chartData.push(hourMap[i]||0); chartColors.push(i===new Date().getHours()?'#6366f1':'#c7d2fe'); }
  } else if (currentStatTab === 'week') {
    const dayNames = ['一','二','三','四','五','六','日'];
    const dayMap = {};
    records.forEach(r => { const d=new Date(r.date+'T12:00:00'); const k=(d.getDay()+6)%7; dayMap[k]=(dayMap[k]||0)+(r.duration_minutes||0); });
    for (let i=0;i<7;i++) { chartLabels.push(`周${dayNames[i]}`); chartData.push(+((dayMap[i]||0)/60).toFixed(1)); chartColors.push(i===((now.getDay()+6)%7)?'#6366f1':'#c7d2fe'); }
  } else if (currentStatTab === 'month') {
    const dim = new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    const dayMap = {};
    records.forEach(r => { const d=parseInt(r.date.split('-')[2]); dayMap[d]=(dayMap[d]||0)+(r.duration_minutes||0); });
    for (let i=1;i<=dim;i++) { chartLabels.push(`${i}`); chartData.push(+((dayMap[i]||0)/60).toFixed(1)); chartColors.push(i===now.getDate()?'#6366f1':'#c7d2fe'); }
  } else {
    const mMap = {};
    records.forEach(r => { const m=parseInt(r.date.split('-')[1])-1; mMap[m]=(mMap[m]||0)+(r.duration_minutes||0); });
    for (let i=0;i<12;i++) { chartLabels.push(`${i+1}月`); chartData.push(+((mMap[i]||0)/60).toFixed(1)); chartColors.push(i===now.getMonth()?'#6366f1':'#c7d2fe'); }
  }

  if (barChartInstance) { barChartInstance.destroy(); barChartInstance = null; }
  barChartInstance = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels: chartLabels, datasets: [{ data: chartData, backgroundColor: chartColors, borderRadius: 8, borderSkipped: false, maxBarThickness: 32 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 0, color: '#94a3b8' } },
        y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 }, color: '#94a3b8' }, beginAtZero: true }
      }
    }
  });
}

async function saveEditCat() {
  const id = document.getElementById('editCatId').value;
  const name = document.getElementById('editCatName').value.trim();
  const icon = document.getElementById('editCatIcon').value.trim() || '📌';
  const color = document.getElementById('editCatColor').value;
  if (!name) { showToast('⚠️ 请输入分类名称'); return; }
  const { error } = await sb.from('categories').update({ name, icon, color }).eq('id', id);
  if (error) { showToast('❌ 保存失败'); return; }
  // 同步更新已有记录的分类名
  await sb.from('records').update({ category_name: name }).eq('category_id', id);
  showToast('✅ 分类已更新');
  closeModal('editCatModal');
  await loadCategories();
  renderCatManage();
}

async function addCategory() {
  const name = document.getElementById('newCatName').value.trim();
  const icon = document.getElementById('newCatIcon').value.trim() || '📌';
  const color = document.getElementById('newCatColor').value;
  if (!name) { showToast('⚠️ 请输入分类名称'); return; }
  const { error } = await sb.from('categories').insert({ name, icon, color });
  if (error) { showToast('❌ 添加失败'); return; }
  document.getElementById('newCatName').value = '';
  document.getElementById('newCatIcon').value = '';
  showToast('✅ 分类已添加');
  await loadCategories();
  renderCatManage();
}
async function deleteCategory(id) {
  if (!confirm('删除此分类？相关记录不受影响')) return;
  await sb.from('categories').delete().eq('id', id);
  await loadCategories();
  renderCatManage();
  showToast('🗑️ 已删除');
}

init();
</script>
