<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>时间记录器</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="时间记录器">
<meta name="theme-color" content="#6366f1">
<link rel="apple-touch-icon" href="https://lazyman.yixiaai.com/files/493397/52b11d58-4025-4b5c-bfff-0f70aa9a2c2d.jpeg">
<link rel="icon" href="https://lazyman.yixiaai.com/files/493397/52b11d58-4025-4b5c-bfff-0f70aa9a2c2d.jpeg">
<script>
const manifest = {
  name:"时间记录器",short_name:"时间记录",start_url:location.href,
  display:"standalone",background_color:"#f0f4ff",theme_color:"#6366f1",
  icons:[{src:"https://lazyman.yixiaai.com/files/493397/52b11d58-4025-4b5c-bfff-0f70aa9a2c2d.jpeg",sizes:"512x512",type:"image/jpeg",purpose:"any maskable"}]
};
const _mb=new Blob([JSON.stringify(manifest)],{type:'application/json'});
const _ml=document.createElement('link');_ml.rel='manifest';_ml.href=URL.createObjectURL(_mb);
document.currentScript.after(_ml);
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f4ff;--card:#fff;--text:#1e293b;--sub:#64748b;
  --border:#e2e8f0;--primary:#6366f1;--radius:16px;
  --shadow:0 2px 16px rgba(99,102,241,0.10);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:90px;}

.conn-bar{position:fixed;top:0;left:0;right:0;z-index:9999;padding:8px 16px;font-size:13px;font-weight:600;text-align:center;transform:translateY(-100%);transition:transform 0.3s;}
.conn-bar.show{transform:translateY(0);}
.conn-bar.offline{background:#ef4444;color:white;}
.conn-bar.reconnecting{background:#f59e0b;color:white;}
.conn-bar.online{background:#22c55e;color:white;}

.header{background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);padding:20px 20px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(99,102,241,0.3);}
.header h1{font-size:20px;font-weight:700;color:white;display:flex;align-items:center;gap:8px;}
.header .date{font-size:13px;color:rgba(255,255,255,0.8);margin-top:4px;}
.nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 20px rgba(0,0,0,0.06);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 8px;font-size:11px;color:#94a3b8;cursor:pointer;border:none;background:none;gap:4px;transition:color 0.2s;}
.nav-btn.active{color:var(--primary);}
.nav-btn .nav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.page{display:none;padding:16px;max-width:480px;margin:0 auto;}
.page.active{display:block;}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-title{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;}
.running-card{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border-radius:var(--radius);padding:24px 20px;margin-bottom:12px;box-shadow:0 8px 30px rgba(99,102,241,0.4);position:relative;overflow:hidden;}
.running-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:rgba(255,255,255,0.08);border-radius:50%;}
.running-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.2);border-radius:20px;padding:4px 10px;font-size:12px;margin-bottom:12px;}
.running-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}
.running-cat{font-size:20px;font-weight:700;margin-bottom:10px;}
.running-time{font-size:52px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:3px;line-height:1;margin-bottom:8px;}
.running-start{font-size:12px;opacity:0.75;}
.stop-btn{margin-top:18px;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.5);color:white;padding:13px;border-radius:14px;font-size:15px;font-weight:600;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.stop-btn:active{background:rgba(255,255,255,0.35);}
.cats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.cat-btn{display:flex;flex-direction:column;align-items:center;padding:16px 8px 12px;border-radius:16px;border:none;cursor:pointer;transition:transform 0.15s;background:var(--bg);}
.cat-btn:active{transform:scale(0.92);}
.cat-icon{font-size:28px;margin-bottom:6px;}
.cat-name{font-size:12px;font-weight:600;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:var(--sub);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
.form-input:focus{border-color:var(--primary);background:white;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(99,102,241,0.35);transition:opacity 0.2s,transform 0.15s;}
.btn-primary:active{opacity:0.88;transform:scale(0.98);}

.note-area{background:var(--bg);border-radius:14px;padding:12px;border:1.5px solid var(--border);transition:border-color 0.2s;}
.note-area:focus-within{border-color:var(--primary);}
.note-input-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.note-text-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:white;color:var(--text);outline:none;}
.note-text-input:focus{border-color:var(--primary);}
.note-chips{display:flex;flex-wrap:wrap;gap:6px;}
.note-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:white;color:var(--text);transition:all 0.15s;user-select:none;}
.note-chip.selected{background:var(--primary);color:white;border-color:var(--primary);}
.note-chip.history-chip{background:#f8fafc;border-style:dashed;}
.note-chip.history-chip.selected{background:var(--primary);color:white;border-style:solid;}
.note-chip-del{font-size:13px;color:#94a3b8;line-height:1;padding:0 2px;transition:color 0.15s;}
.note-chip-del:hover{color:#ef4444;}
.note-chip.selected .note-chip-del{color:rgba(255,255,255,0.7);}
.note-chip.selected .note-chip-del:hover{color:white;}
.note-section-label{font-size:10px;color:var(--sub);font-weight:600;letter-spacing:0.5px;margin-bottom:6px;margin-top:8px;}
.note-add-row{display:flex;gap:6px;margin-top:8px;}
.note-add-input{flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:white;color:var(--text);outline:none;}
.note-add-input:focus{border-color:var(--primary);}
.note-add-btn{padding:6px 12px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap;}

.record-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.record-item:last-child{border-bottom:none;}
.record-dot{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.record-info{flex:1;min-width:0;}
.record-cat{font-size:14px;font-weight:600;}
.record-time{font-size:12px;color:var(--sub);margin-top:2px;}
.record-note{font-size:12px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.record-dur{font-size:13px;font-weight:700;color:var(--primary);flex-shrink:0;}
.record-actions{display:flex;gap:4px;}
.btn-icon{background:var(--bg);border:none;cursor:pointer;padding:6px;border-radius:10px;font-size:15px;transition:background 0.15s;}
.btn-icon:active{background:var(--border);}

.stat-tabs{display:flex;background:white;border-radius:14px;padding:4px;margin-bottom:16px;box-shadow:var(--shadow);flex-wrap:wrap;gap:2px;}
.stat-tab{flex:1;text-align:center;padding:9px 4px;border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;color:var(--sub);border:none;background:none;transition:all 0.2s;min-width:0;}
.stat-tab.active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;box-shadow:0 3px 10px rgba(99,102,241,0.35);}
.stat-date-pick{display:none;margin-bottom:12px;}
.stat-date-pick.show{display:block;}
.stat-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:white;border-radius:14px;padding:16px;box-shadow:var(--shadow);}
.stat-val{font-size:26px;font-weight:800;color:var(--primary);}
.stat-lbl{font-size:11px;color:var(--sub);margin-top:3px;font-weight:500;}
.chart-wrap{background:white;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.chart-title{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
.chart-inner{height:180px;position:relative;}
.pie-wrap{background:white;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.pie-inner{height:200px;position:relative;}
.cat-stat-item{border-bottom:1px solid var(--border);}
.cat-stat-item:last-child{border-bottom:none;}
.cat-stat-header{display:flex;align-items:center;gap:10px;padding:12px 0;cursor:pointer;user-select:none;}
.cat-stat-bar-wrap{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.cat-stat-bar{height:100%;border-radius:3px;transition:width 0.6s ease;}
.cat-stat-time{font-size:12px;font-weight:700;color:var(--sub);min-width:52px;text-align:right;}
.cat-stat-arrow{font-size:11px;color:var(--sub);transition:transform 0.25s;flex-shrink:0;margin-left:2px;}
.cat-stat-arrow.open{transform:rotate(90deg);}
.note-stats{display:none;background:var(--bg);border-radius:12px;padding:12px;margin-bottom:10px;}
.note-stats.open{display:block;}
.note-chart-wrap{height:150px;position:relative;margin-bottom:10px;}
.note-stat-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.note-stat-item:last-child{border-bottom:none;}
.note-stat-label{font-size:12px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-stat-bar-wrap{width:70px;height:5px;background:white;border-radius:3px;overflow:hidden;}
.note-stat-bar{height:100%;border-radius:3px;}
.note-stat-time{font-size:11px;font-weight:700;color:var(--sub);min-width:44px;text-align:right;}

.export-btn{display:flex;align-items:center;gap:14px;padding:16px;background:white;border-radius:14px;border:none;width:100%;cursor:pointer;margin-bottom:10px;box-shadow:var(--shadow);transition:transform 0.15s;}
.export-btn:active{transform:scale(0.98);}
.export-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.export-name{font-size:15px;font-weight:600;text-align:left;}
.export-desc{font-size:12px;color:var(--sub);margin-top:2px;text-align:left;}

.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:#1e293b;color:white;padding:12px 22px;border-radius:14px;font-size:14px;font-weight:500;z-index:9999;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.2);}
.toast.show{transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:40px 20px;color:var(--sub);}
.empty-icon{font-size:44px;margin-bottom:10px;}
.empty p{font-size:14px;}
.loading{text-align:center;padding:30px;color:var(--sub);font-size:14px;}

.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(2px);}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:24px 24px 0 0;padding:24px 20px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1);}
.modal-overlay.show .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:700;}
.modal-close{background:var(--bg);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--sub);}
select.form-input{appearance:none;-webkit-appearance:none;}
.cat-manage-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.cat-manage-item:last-child{border-bottom:none;}
.cat-manage-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cat-manage-name{flex:1;font-size:14px;font-weight:600;}
.fill-tip{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac;border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#166534;display:flex;align-items:center;gap:8px;}
.fill-warn{background:linear-gradient(135deg,#fef9c3,#fef08a);border:1px solid #fde047;border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#854d0e;display:flex;align-items:flex-start;gap:8px;}
.cat-notes-section{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
.cat-notes-title{font-size:11px;color:var(--sub);font-weight:600;margin-bottom:8px;}
.cat-note-tag-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.cat-note-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;font-size:12px;}
.cat-note-tag-del{color:#ef4444;cursor:pointer;font-size:13px;line-height:1;}
.cat-note-add-row{display:flex;gap:6px;}
.cat-note-add-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--bg);color:var(--text);outline:none;}
.cat-note-add-input:focus{border-color:var(--primary);}
.cat-note-add-btn{padding:8px 14px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:13px;cursor:pointer;white-space:nowrap;}

.history-date-nav{display:flex;align-items:center;gap:8px;background:white;border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
.history-date-selects{display:flex;gap:6px;flex:1;}
.history-date-selects select{flex:1;padding:8px 4px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;color:var(--text);background:var(--bg);outline:none;appearance:none;-webkit-appearance:none;text-align:center;}
.history-date-selects select:focus{border-color:var(--primary);}
.history-nav-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:16px;cursor:pointer;color:var(--sub);transition:all 0.15s;flex-shrink:0;}
.history-nav-btn:active{background:var(--primary);color:white;border-color:var(--primary);}
.history-today-btn{background:var(--primary);color:white;border:none;border-radius:10px;padding:8px 10px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;}

.dialog-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.dialog-box{background:white;border-radius:20px;padding:24px 20px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.dialog-title{font-size:16px;font-weight:700;margin-bottom:10px;}
.dialog-desc{font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.6;}
.dialog-btns{display:flex;flex-direction:column;gap:8px;}
.dialog-btn{padding:12px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:all 0.15s;width:100%;}
.dialog-btn:active{background:var(--primary);color:white;border-color:var(--primary);}
.dialog-btn-cancel{background:none;border:none;color:var(--sub);font-size:13px;cursor:pointer;padding:8px;text-align:center;width:100%;}

.autofill-modal{position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;}
.autofill-box{background:white;border-radius:20px;padding:24px 20px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-height:80vh;overflow-y:auto;}
.autofill-title{font-size:17px;font-weight:700;margin-bottom:8px;}
.autofill-sub{font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.6;}
.autofill-gaps{background:var(--bg);border-radius:12px;padding:10px 12px;margin-bottom:16px;max-height:300px;overflow-y:auto;}
.autofill-gap-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text);padding:8px 0;border-bottom:1px solid var(--border);}
.autofill-gap-item:last-child{border-bottom:none;}
.autofill-checkbox{width:18px;height:18px;cursor:pointer;flex-shrink:0;accent-color:var(--primary);}
.autofill-gap-info{flex:1;user-select:none;}
.autofill-btns{display:flex;gap:8px;}
.autofill-btn-yes{flex:1;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;}
.autofill-btn-no{flex:1;padding:12px;background:var(--bg);border:1.5px solid var(--border);color:var(--sub);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;}

.timer-remark-overlay{
  position:fixed;inset:0;
  background:rgba(15,23,42,0.65);
  z-index:450;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  backdrop-filter:blur(3px);
}
.timer-remark-box{
  background:white;
  border-radius:24px;
  padding:0;
  max-width:380px;
  width:100%;
  box-shadow:0 24px 64px rgba(0,0,0,0.22);
  overflow:hidden;
  animation:remarkSlideUp 0.38s cubic-bezier(0.34,1.2,0.64,1);
}
@keyframes remarkSlideUp{
  from{transform:translateY(50px) scale(0.95);opacity:0;}
  to{transform:translateY(0) scale(1);opacity:1;}
}
.timer-remark-head{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  padding:22px 20px 18px;
  display:flex;align-items:center;gap:14px;
  position:relative;
}
.timer-remark-head-icon{
  width:52px;height:52px;
  background:rgba(255,255,255,0.2);
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
}
.timer-remark-head-info{flex:1;}
.timer-remark-head-title{
  font-size:18px;font-weight:800;color:white;margin-bottom:4px;
}
.timer-remark-head-sub{
  font-size:13px;color:rgba(255,255,255,0.8);
  display:flex;align-items:center;gap:6px;
}
.timer-remark-head-dur{
  background:rgba(255,255,255,0.2);
  border-radius:20px;padding:2px 10px;
  font-size:13px;font-weight:700;color:white;
}
.timer-remark-close-btn{
  position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,0.2);border:none;
  width:28px;height:28px;border-radius:50%;
  cursor:pointer;font-size:14px;color:white;
  display:flex;align-items:center;justify-content:center;
}
.timer-remark-body{padding:20px 20px 0;}
.timer-remark-input-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:12px;padding:4px 4px 4px 14px;
  margin-bottom:14px;transition:border-color 0.2s;
}
.timer-remark-input-wrap:focus-within{border-color:var(--primary);background:white;}
.timer-remark-input{
  flex:1;border:none;background:transparent;
  font-size:15px;color:var(--text);outline:none;
  padding:8px 0;
}

<script>
const SUPABASE_URL='https://buyrevhbxypsekpmctmj.supabase.co';
const SUPABASE_KEY='sb_publishable_aDBUcvGvxxxyr1XS37JX3g_WnE3s6x-';
let sb;

let _connRetry=0;
let _connOk=false;

function initSupabase(){
  try{
    sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
      realtime:{timeout:30000},
      global:{fetch:(...args)=>{
        return Promise.race([
          fetch(...args),
          new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),15000))
        ]);
      }}
    });
    return true;
  }catch(e){return false;}
}

async function checkConn(){
  try{
    const r=await Promise.race([
      sb.from('categories').select('id').limit(1),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000))
    ]);
    if(r&&r.error&&r.error.message&&r.error.message.includes('timeout'))throw new Error('timeout');
    return true;
  }catch(e){return false;}
}

function showConnBar(type,msg){
  const bar=document.getElementById('connBar');
  bar.className='conn-bar '+type+' show';
  bar.textContent=msg;
  if(type==='online'){setTimeout(()=>bar.classList.remove('show'),3000);}
}

async function ensureConn(){
  if(_connOk)return true;
  showConnBar('reconnecting','🔄 正在重新连接...');
  for(let i=0;i<3;i++){
    await new Promise(r=>setTimeout(r,1500*Math.pow(2,i)));
    initSupabase();
    const ok=await checkConn();
    if(ok){_connOk=true;showConnBar('online','✅ 已连接');return true;}
  }
  showConnBar('offline','❌ 网络连接失败，请检查网络后刷新');
  return false;
}

window.addEventListener('online',async()=>{
  _connOk=false;
  const ok=await ensureConn();
  if(ok){showConnBar('online','✅ 网络已恢复');init();}
});
window.addEventListener('offline',()=>{
  _connOk=false;
  showConnBar('offline','📵 网络已断开');
});

async function sbQuery(fn){
  try{
    if(!_connOk){
      const ok=await ensureConn();
      if(!ok)return{data:null,error:{message:'无网络连接'}};
    }
    const result=await fn();
    if(result&&result.error&&(result.error.message||'').toLowerCase().includes('fetch')){
      _connOk=false;
      return await sbQuery(fn);
    }
    return result;
  }catch(e){
    _connOk=false;
    return{data:null,error:{message:e.message}};
  }
}

let categories=[];
let runningRecord=null;
let timerInterval=null;
let startTimestamp=null;
let currentStatTab='day';
let editingId=null;
let barChartInstance=null;
let pieChartInstance=null;
const noteChartInstances={};
let editingCatNotes=[];
let historyCurrentDate=new Date();

let pendingAutofillDate=null;
let pendingAutofillGaps=[];
let pendingAutofillCat=null;

const noteStates={};

let _trRecordId=null;
let _trCatId=null;
let _trDur=0;
let _trSelected='';

// ✨ 计时器持久化
function saveTimerState(){
  if(runningRecord && startTimestamp){
    localStorage.setItem('timer_running', JSON.stringify({
      record: runningRecord,
      startTime: startTimestamp
    }));
  } else {
    localStorage.removeItem('timer_running');
  }
}

function restoreTimerState(){
  const saved = localStorage.getItem('timer_running');
  if(saved){
    try{
      const data = JSON.parse(saved);
      runningRecord = data.record;
      startTimestamp = data.startTime;
      startTimer();
      return true;
    }catch(e){
      localStorage.removeItem('timer_running');
    }
  }
  return false;
}

//===== 工具函数 =====
function toDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function nowTimeStr(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function formatDateCN(d){const days=['周日','周一','周二','周三','周四','周五','周六'];return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'+days[d.getDay()];}
function fmtDur(mins){if(mins===null||mins===undefined||isNaN(mins))return'-';mins=Math.max(0,Math.round(mins));if(mins<60)return mins+'分钟';const h=Math.floor(mins/60),m=mins%60;return m?h+'h '+m+'m':h+'h';}
function fmtTime(t){return t?t.slice(0,5):'--:--';}
function calcMins(start,end){const[sh,sm]=start.split(':').map(Number);const[eh,em]=end.split(':').map(Number);return(eh*60+em)-(sh*60+sm);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}

// ===== 初始化 =====
async function init(){
  initSupabase();
  const ok=await checkConn();
  _connOk=ok;
  if(!ok){showConnBar('offline','❌ 无法连接服务器，请检查网络');return;}
  const today=new Date();
  document.getElementById('headerDate').textContent=formatDateCN(today);
  document.getElementById('fDate').value=toDateStr(today);
  document.getElementById('statPickDate').value=toDateStr(today);
  historyCurrentDate=new Date(today);
  initHistoryDateSelectors();
  await loadCategories();
  await checkRunning();
  await checkYesterdayAutofill();
  loadHistory();
  setInterval(checkDayChange,60000);
}

let _lastDay=new Date().getDate();
function checkDayChange(){
  const now=new Date();
  if(now.getDate()!==_lastDay){
    _lastDay=now.getDate();
    document.getElementById('headerDate').textContent=formatDateCN(now);
    document.getElementById('fDate').value=toDateStr(now);
    showToast('🌅 新的一天开始了');
    checkYesterdayAutofill();
    const histPage=document.getElementById('page-history');
    if(histPage.classList.contains('active'))historyGoToday();
  }
}

// ===== ✨ 修改后的自动填充 =====
async function checkYesterdayAutofill(){
  // 如果正在计时，不提示填充
  if(runningRecord){
    console.log('正在计时中，跳过自动填充提示');
    return;
  }
  
  const today=new Date();
  const yesterday=new Date(today);
  yesterday.setDate(yesterday.getDate()-1);
  const yStr=toDateStr(yesterday);
  const doneKey='autofill_done_'+yStr;
  
  if(localStorage.getItem(doneKey))return;
  
  const{data}=await sbQuery(()=>sb.from('records').select('*').eq('date',yStr).eq('is_running',false).order('start_time'));
  if(!data)return;
  
  const hasAutoFill=data.some(r=>r.note==='自动填充');
  if(hasAutoFill){localStorage.setItem(doneKey,'1');return;}
  
  const gaps=findGaps(data,'00:00','23:59').filter(g=>calcMins(g.start,g.end)>0);
  if(!gaps.length){localStorage.setItem(doneKey,'1');return;}
  
  let otherCat=categories.find(c=>c.name==='其他');
  if(!otherCat){
    const{data:nc}=await sbQuery(()=>sb.from('categories').insert({name:'其他',icon:'⬜',color:'#94a3b8'}).select().single());
    if(nc){categories.push(nc);otherCat=nc;renderCatsGrid();renderCatSelect('fCat');}
  }
  
  pendingAutofillDate=yStr;
  pendingAutofillGaps=gaps;
  pendingAutofillCat=otherCat;
  
  document.getElementById('autofillSub').textContent=`${yesterday.getMonth()+1}月${yesterday.getDate()}日 共有${gaps.length}段时间未记录，选择需要填充的时段：`;
  
  // 生成带复选框的列表
  const gapHtml=gaps.map((g,idx)=>`
    <div class="autofill-gap-item">
      <input type="checkbox" class="autofill-checkbox" id="gap-${idx}" checked>
      <label for="gap-${idx}" class="autofill-gap-info" style="cursor:pointer;">
        ⏱ ${g.start} → ${g.end}（${fmtDur(calcMins(g.start,g.end))}）
      </label>
    </div>
  `).join('');
  
  document.getElementById('autofillGaps').innerHTML=gapHtml;
  document.getElementById('autofillModal').style.display='flex';
}

async function doAutofillSelected(){
  document.getElementById('autofillModal').style.display='none';
  const doneKey='autofill_done_'+pendingAutofillDate;
  localStorage.setItem(doneKey,'1');
  
  if(!pendingAutofillCat||!pendingAutofillGaps.length)return;
  
  let filledCount = 0;
  for(let i=0; i<pendingAutofillGaps.length; i++){
    const checkbox = document.getElementById('gap-'+i);
    if(checkbox && checkbox.checked){
      const gap = pendingAutofillGaps[i];
      await sbQuery(()=>sb.from('records').insert({
        date:pendingAutofillDate,
        start_time:gap.start,
        end_time:gap.end,
        duration_minutes:calcMins(gap.start,gap.end),
        category_id:pendingAutofillCat.id,
        category_name:'其他',
        note:'自动填充',
        is_running:false
      }));
      filledCount++;
    }
  }
  
  if(filledCount > 0){
    showToast('✅ 已填充 '+filledCount+' 段空白');
    loadHistory();
  } else {
    showToast('ℹ️ 未选择任何时段');
  }
}

// ===== 历史日期选择器 =====
function initHistoryDateSelectors(){
  const now=new Date();
  const yearSel=document.getElementById('historyYear');
  const monthSel=document.getElementById('historyMonth');
  yearSel.innerHTML='';
  for(let y=now.getFullYear();y>=now.getFullYear()-4;y--){
    const o=document.createElement('option');o.value=y;o.textContent=y+'年';
    if(y===historyCurrentDate.getFullYear())o.selected=true;
    yearSel.appendChild(o);
  }
  monthSel.innerHTML='';
  for(let m=1;m<=12;m++){
    const o=document.createElement('option');o.value=m;o.textContent=m+'月';
    if(m===historyCurrentDate.getMonth()+1)o.selected=true;
    monthSel.appendChild(o);
  }
  updateHistoryDaySelector();
}

function updateHistoryDaySelector(){
  const y=parseInt(document.getElementById('historyYear').value);
  const m=parseInt(document.getElementById('historyMonth').value);
  const daySel=document.getElementById('historyDay');
  const dim=new Date(y,m,0).getDate();
  const cur=historyCurrentDate.getDate();
  daySel.innerHTML='';
  for(let d=1;d<=dim;d++){
    const o=document.createElement('option');o.value=d;o.textContent=d+'日';
    if(d===Math.min(cur,dim))o.selected=true;
    daySel.appendChild(o);
  }
}

function onHistoryDateChange(){
  updateHistoryDaySelector();
  const y=parseInt(document.getElementById('historyYear').value);
  const m=parseInt(document.getElementById('historyMonth').value);
  const d=parseInt(document.getElementById('historyDay').value);
  historyCurrentDate=new Date(y,m-1,d);
  loadHistory();
}

function historyDateShift(delta){
  historyCurrentDate.setDate(historyCurrentDate.getDate()+delta);
  syncHistorySelectors();
  loadHistory();
}

function historyGoToday(){
  historyCurrentDate=new Date();
  syncHistorySelectors();
  loadHistory();
}

function syncHistorySelectors(){
  const y=historyCurrentDate.getFullYear();
  const m=historyCurrentDate.getMonth()+1;
  const d=historyCurrentDate.getDate();
  const yearSel=document.getElementById('historyYear');
  let found=false;
  for(let o of yearSel.options){
    if(parseInt(o.value)===y){o.selected=true;found=true;break;}
  }
  if(!found){initHistoryDateSelectors();return;}
  document.getElementById('historyMonth').value=m;
  updateHistoryDaySelector();
  document.getElementById('historyDay').value=d;
}

// ===== 备注区域 =====
async function renderNoteArea(areaId,catSelectId,currentNote){
  const area=document.getElementById(areaId);
  if(!area)return;
  const catId=document.getElementById(catSelectId)?document.getElementById(catSelectId).value:'';
  const cat=categories.find(c=>c.id===catId);
  const presets=(cat&&cat.preset_notes)?cat.preset_notes:[];
  const{data}=await sbQuery(()=>sb.from('records').select('note').eq('category_id',catId).eq('is_running',false));
  const noteCount={};
  (data||[]).forEach(r=>{
    if(r.note&&r.note.trim()&&r.note.trim()!=='自动填充'){
      const k=r.note.trim();
      noteCount[k]=(noteCount[k]||0)+1;
    }
  });
  const histNotes=Object.entries(noteCount).filter(([k])=>!presets.includes(k)).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(!noteStates[areaId])noteStates[areaId]={selected:'',editing:null};
  if(currentNote!==undefined)noteStates[areaId].selected=currentNote||'';
  _renderNoteAreaHTML(areaId,catSelectId,presets,histNotes,noteStates[areaId].selected,catId);
}

function _renderNoteAreaHTML(areaId,catSelectId,presets,histNotes,selected,catId){
  const area=document.getElementById(areaId);
  if(!area)return;
  let html='<div class="note-area">';
  html+='<div class="note-input-row">';
  html+='<input type="text" class="note-text-input" id="'+areaId+'_input" placeholder="输入备注..." value="'+escHtml(selected)+'" oninput="_onNoteInput(\''+areaId+'\',\''+catSelectId+'\')">';
  html+='</div>';
  if(presets.length){
    html+='<div class="note-section-label">📌 固定备注</div>';
    html+='<div class="note-chips">';
    presets.forEach((n,i)=>{
      const isSel=selected===n;
      html+='<span class="note-chip'+(isSel?' selected':'')+'" onclick="_selectNoteChip(\''+areaId+'\',\''+catSelectId+'\',\''+escAttr(n)+'\')">'+escHtml(n);
      html+='<span class="note-chip-del" onclick="event.stopPropagation();_deletePresetNote(\''+catId+'\','+i+',\''+areaId+'\',\''+catSelectId+'\')">×</span>';
      html+='</span>';
    });
    html+='</div>';
  }
  if(histNotes.length){
    html+='<div class="note-section-label">🕐 历史备注</div>';
    html+='<div class="note-chips">';
    histNotes.forEach(([n,cnt])=>{
      const isSel=selected===n;
      html+='<span class="note-chip history-chip'+(isSel?' selected':'')+'" onclick="_selectNoteChip(\''+areaId+'\',\''+catSelectId+'\',\''+escAttr(n)+'\')">'+escHtml(n)+'<span style="font-size:10px;opacity:0.6;margin-left:2px;">'+cnt+'</span></span>';
    });
    html+='</div>';
  }
  html+='<div class="note-add-row">';
  html+='<input type="text" class="note-add-input" id="'+areaId+'_addInput" placeholder="添加为固定备注..." onkeydown="if(event.key===\'Enter\'){event.preventDefault();_addPresetFromArea(\''+areaId+'\',\''+catSelectId+'\');}">';
  html+='<button class="note-add-btn" onclick="_addPresetFromArea(\''+areaId+'\',\''+catSelectId+'\')">+ 固定</button>';
  html+='</div>';
  html+='</div>';
  area.innerHTML=html;
}

function _onNoteInput(areaId,catSelectId){
  const input=document.getElementById(areaId+'_input');
  if(!input)return;
  const val=input.value;
  if(!noteStates[areaId])noteStates[areaId]={selected:''};
  noteStates[areaId].selected=val;
  document.querySelectorAll('#'+areaId+' .note-chip').forEach(c=>{
    const text=c.childNodes[0]&&c.childNodes[0].textContent?c.childNodes[0].textContent.trim():'';
    c.classList.toggle('selected',text===val&&val!=='');
  });
}

function _selectNoteChip(areaId,catSelectId,val){
  if(!noteStates[areaId])noteStates[areaId]={selected:''};
  const prev=noteStates[areaId].selected;
  const newVal=prev===val?'':val;
  noteStates[areaId].selected=newVal;
  const input=document.getElementById(areaId+'_input');
  if(input)input.value=newVal;
  document.querySelectorAll('#'+areaId+' .note-chip').forEach(c=>{
    const text=c.childNodes[0]&&c.childNodes[0].textContent?c.childNodes[0].textContent.trim():'';
    c.classList.toggle('selected',text===newVal&&newVal!=='');
  });
}

function getNoteValue(areaId){
  const input=document.getElementById(areaId+'_input');
  return input?input.value.trim():'';
}

async function _addPresetFromArea(areaId,catSelectId){
  const addInput=document.getElementById(areaId+'_addInput');
  if(!addInput)return;
  const val=addInput.value.trim();
  if(!val){showToast('⚠️ 请输入备注内容');return;}
  const catId=document.getElementById(catSelectId)?document.getElementById(catSelectId).value:'';
  const cat=categories.find(c=>c.id===catId);
  if(!cat)return;
  const presets=(cat.preset_notes&&cat.preset_notes.length)?[...cat.preset_notes]:[];
  if(presets.includes(val)){showToast('⚠️ 已存在');return;}
  presets.push(val);
  const{error}=await sbQuery(()=>sb.from('categories').update({preset_notes:presets}).eq('id',catId));
  if(error){showToast('❌ 添加失败');return;}
  cat.preset_notes=presets;
  addInput.value='';
  showToast('✅ 已添加固定备注');
  const curNote=getNoteValue(areaId);
  await renderNoteArea(areaId,catSelectId,curNote);
}

async function _deletePresetNote(catId,idx,areaId,catSelectId){
  const cat=categories.find(c=>c.id===catId);
  if(!cat)return;
  const presets=[...(cat.preset_notes||[])];
  const removed=presets[idx];
  if(!confirm('删除固定备注「'+removed+'」？'))return;
  presets.splice(idx,1);
  const{error}=await sbQuery(()=>sb.from('categories').update({preset_notes:presets}).eq('id',catId));
  if(error){showToast('❌ 删除失败');return;}
  cat.preset_notes=presets;
  showToast('🗑️ 已删除');
  const curNote=getNoteValue(areaId);
  await renderNoteArea(areaId,catSelectId,curNote);
}

// ===== ✨ 修改后的计时器 =====
async function checkRunning(){
  // 先尝试从本地恢复
  if(restoreTimerState()){
    console.log('从本地恢复计时器');
  }
  
  // 再从数据库检查
  const{data}=await sbQuery(()=>sb.from('records').select('*').eq('is_running',true).maybeSingle());
  if(data){
    runningRecord=data;
    const parts=data.start_time.slice(0,5).split(':').map(Number);
    const sd=new Date(data.date+'T00:00:00');
    sd.setHours(parts[0],parts[1],0,0);
    startTimestamp=sd.getTime();
    startTimer();
    saveTimerState();
  }
}

async function quickStart(catId){
  if(runningRecord){showToast('⚠️ 请先停止当前计时');return;}
  const cat=categories.find(c=>c.id===catId);
  const now=new Date();
  startTimestamp=now.getTime();
  const{data,error}=await sbQuery(()=>sb.from('records').insert({
    date:toDateStr(now),
    start_time:nowTimeStr(),
    category_id:catId,
    category_name:cat.name,
    is_running:true
  }).select().single());
  if(error){showToast('❌ 启动失败');return;}
  runningRecord=data;
  saveTimerState();
  startTimer();
  showToast('▶️ 开始：'+cat.icon+' '+cat.name);
}

function startTimer(){
  clearInterval(timerInterval);
  renderRunning();
  timerInterval=setInterval(renderRunning,1000);
}

function renderRunning(){
  const wrap=document.getElementById('runningCard');
  if(!runningRecord){wrap.innerHTML='';return;}
  const cat=categories.find(c=>c.id===runningRecord.category_id)||{};
  const elapsed=Math.max(0,Math.floor((Date.now()-startTimestamp)/1000));
  const h=String(Math.floor(elapsed/3600)).padStart(2,'0');
  const m=String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
  const s=String(elapsed%60).padStart(2,'0');
  wrap.innerHTML='<div class="running-card">'+
    '<div class="running-badge"><div class="running-dot"></div>正在计时</div>'+
    '<div class="running-cat">'+(cat.icon||'⏱')+' '+runningRecord.category_name+'</div>'+
    '<div class="running-time">'+h+':'+m+':'+s+'</div>'+
    '<div class="running-start">开始于 '+fmtTime(runningRecord.start_time)+'</div>'+
    '<button class="stop-btn" onclick="stopTimer()">⏹ 停止计时</button></div>';
}

// ✨ 修改后的 stopTimer：支持跨天分割
async function stopTimer(){
  if(!runningRecord)return;
  clearInterval(timerInterval);

  const now = new Date();
  const endTime = nowTimeStr();
  const endDate = toDateStr(now);
  
  // 检查是否跨天
  const startDate = runningRecord.date;
  const startTime = runningRecord.start_time.slice(0,5);
  
  if(startDate !== endDate){
    // 跨天了，需要分割
    showToast('🌙 检测到跨天计时，自动分割为两段');
    
    // 第一段：开始时间到当天23:59
    const dur1 = calcMins(startTime, '23:59');
    await sbQuery(()=>sb.from('records').update({
      end_time:'23:59',
      duration_minutes:dur1,
      is_running:false
    }).eq('id',runningRecord.id));
    
    // 第二段：第二天00:00到结束时间
    const dur2 = calcMins('00:00', endTime);
    const{data:newRecord}=await sbQuery(()=>sb.from('records').insert({
      date:endDate,
      start_time:'00:00',
      end_time:endTime,
      duration_minutes:dur2,
      category_id:runningRecord.category_id,
      category_name:runningRecord.category_name,
      is_running:false
    }).select().single());
    
    // 清空计时状态
    runningRecord=null;
    startTimestamp=null;
    saveTimerState();
    document.getElementById('runningCard').innerHTML='';
    
    // 弹出备注弹窗（针对第二段）
    if(newRecord){
      await showTimerRemarkModal(newRecord.id, newRecord.category_id, dur2);
    }
  } else {
    // 没有跨天，正常处理
    const elapsed=Math.floor((Date.now()-startTimestamp)/1000);
    const dur=Math.max(0,Math.round(elapsed/60));

    _trRecordId=runningRecord.id;
    _trCatId=runningRecord.category_id;
    _trDur=dur;

    await sbQuery(()=>sb.from('records').update({
      end_time:endTime,
      duration_minutes:dur,
      is_running:false
    }).eq('id',runningRecord.id));

    runningRecord=null;
    startTimestamp=null;
    saveTimerState();
    document.getElementById('runningCard').innerHTML='';

    await showTimerRemarkModal(_trRecordId,_trCatId,_trDur);
  }
}

// ===== 跨天分割=====
function splitCrossDay(date,start,end){
  const[sh,sm]=start.split(':').map(Number);
  const[eh,em]=end.split(':').map(Number);
  if(eh*60+em>=sh*60+sm)return null;
  const d1=new Date(date+'T12:00:00');
  const d2=new Date(d1);
  d2.setDate(d2.getDate()+1);
  return[
    {date:toDateStr(d1),start:start,end:'23:59'},
    {date:toDateStr(d2),start:'00:00',end:end}
  ];
}

// ===== 时间重叠检测 =====
async function checkOverlap(date,start,end,excludeId){
  let query=sb.from('records').select('*').eq('date',date).eq('is_running',false);
  if(excludeId)query=query.neq('id',excludeId);
  const{data}=await sbQuery(()=>query);
  if(!data||!data.length)return[];
  const[sh,sm]=start.split(':').map(Number);
  const[eh,em]=end.split(':').map(Number);
  const ns=sh*60+sm,ne=eh*60+em;
  return data.filter(r=>{
    if(!r.start_time||!r.end_time)return false;
    const[rs,rss]=r.start_time.slice(0,5).split(':').map(Number);
    const[re,rem]=r.end_time.slice(0,5).split(':').map(Number);
    return ns<re*60+rem&&ne>rs*60+rss;
  });
}

function showOverlapDialog(overlaps,newStart,newEnd){
  return new Promise(resolve=>{
    const existing=overlaps.map(r=>`「${r.category_name}」${fmtTime(r.start_time)}~${fmtTime(r.end_time)}`).join('、');
    const div=document.createElement('div');
    div.className='dialog-overlay';
    div.innerHTML=`<div class="dialog-box">
      <div class="dialog-title">⚠️ 检测到时间重叠</div>
      <div class="dialog-desc">新记录（${newStart}~${newEnd}）与已有记录重叠：<br><strong>${existing}</strong></div>
      <div class="dialog-btns">
        <button class="dialog-btn" id="ob-new">✅ 以新记录为准（裁剪已有）</button>
        <button class="dialog-btn" id="ob-old">📌 以已有记录为准（裁剪新记录）</button>
        <button class="dialog-btn" id="ob-keep">💾 直接保存（保留重叠）</button>
        <button class="dialog-btn-cancel" id="ob-cancel">取消</button>
      </div></div>`;
    document.body.appendChild(div);
    div.querySelector('#ob-new').onclick=()=>{document.body.removeChild(div);resolve('new');};
    div.querySelector('#ob-old').onclick=()=>{document.body.removeChild(div);resolve('old');};
    div.querySelector('#ob-keep').onclick=()=>{document.body.removeChild(div);resolve('keep');};
    div.querySelector('#ob-cancel').onclick=()=>{document.body.removeChild(div);resolve('cancel');};
  });
}

async function resolveOverlapNewWins(overlaps,newStart,newEnd){
  const[sh,sm]=newStart.split(':').map(Number);
  const[eh,em]=newEnd.split(':').map(Number);
  const ns=sh*60+sm,ne=eh*60+em;
  for(const r of overlaps){
    const[rs,rss]=r.start_time.slice(0,5).split(':').map(Number);
    const[re,rem]=r.end_time.slice(0,5).split(':').map(Number);
    const rStart=rs*60+rss,rEnd=re*60+rem;
    if(ns<=rStart&&ne>=rEnd){
      await sbQuery(()=>sb.from('records').delete().eq('id',r.id));
    }else if(ns<=rStart){
      const s=minsToTime(ne);
      await sbQuery(()=>sb.from('records').update({start_time:s,duration_minutes:rEnd-ne}).eq('id',r.id));
    }else if(ne>=rEnd){
      const s=minsToTime(ns);
      await sbQuery(()=>sb.from('records').update({end_time:s,duration_minutes:ns-rStart}).eq('id',r.id));
    }else{
      await sbQuery(()=>sb.from('records').update({end_time:minsToTime(ns),duration_minutes:ns-rStart}).eq('id',r.id));
      await sbQuery(()=>sb.from('records').insert({date:r.date,start_time:minsToTime(ne),end_time:r.end_time,duration_minutes:rEnd-ne,category_id:r.category_id,category_name:r.category_name,note:r.note,is_running:false}));
    }
  }
}

function resolveOverlapOldWins(overlaps,newStart,newEnd){
  const[sh,sm]=newStart.split(':').map(Number);
  const[eh,em]=newEnd.split(':').map(Number);
  let segs=[{start:sh*60+sm,end:eh*60+em}];
  for(const r of overlaps){
    const[rs,rss]=r.start_time.slice(0,5).split(':').map(Number);
    const[re,rem]=r.end_time.slice(0,5).split(':').map(Number);
    const rStart=rs*60+rss,rEnd=re*60+rem;
    const newSegs=[];
    for(const seg of segs){
      if(rStart<=seg.start&&rEnd>=seg.end)continue;
      if(rEnd<=seg.start||rStart>=seg.end){newSegs.push(seg);continue;}
      if(rStart>seg.start)newSegs.push({start:seg.start,end:rStart});
      if(rEnd<seg.end)newSegs.push({start:rEnd,end:seg.end});
    }
    segs=newSegs;
  }
  return segs.filter(s=>s.end-s.start>0).map(s=>({start:minsToTime(s.start),end:minsToTime(s.end),mins:s.end-s.start}));
}

function minsToTime(m){
  return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
}

async function insertWithOverlapCheck(date,start,end,catId,catName,note,excludeId){
  const overlaps=await checkOverlap(date,start,end,excludeId);
  if(overlaps.length>0){
    const choice=await showOverlapDialog(overlaps,start,end);
    if(choice==='cancel')return;
    if(choice==='new'){
      await resolveOverlapNewWins(overlaps,start,end);
      await sbQuery(()=>sb.from('records').insert({date,start_time:start,end_time:end,duration_minutes:calcMins(start,end),category_id:catId,category_name:catName,note,is_running:false}));
      showToast('✅ 已添加（已裁剪冲突记录）');
    }else if(choice==='old'){
      const segs=resolveOverlapOldWins(overlaps,start,end);
      if(!segs.length){showToast('⚠️ 新记录被完全覆盖，未添加');return;}
      for(const seg of segs){
        await sbQuery(()=>sb.from('records').insert({date,start_time:seg.start,end_time:seg.end,duration_minutes:seg.mins,category_id:catId,category_name:catName,note,is_running:false}));
      }
      showToast('✅ 已添加（已避开冲突时段）');
    }else{
      await sbQuery(()=>sb.from('records').insert({date,start_time:start,end_time:end,duration_minutes:calcMins(start,end),category_id:catId,category_name:catName,note,is_running:false}));
      showToast('✅ 添加成功');
    }
  }else{
    await sbQuery(()=>sb.from('records').insert({date,start_time:start,end_time:end,duration_minutes:calcMins(start,end),category_id:catId,category_name:catName,note,is_running:false}));

}

function findGaps(records,dayStart,dayEnd){
  if(!records||!records.length)return[{start:dayStart,end:dayEnd}];
  const sorted=[...records].sort((a,b)=>a.start_time.localeCompare(b.start_time));
  const gaps=[];
  let cursor=dayStart;
  for(const r of sorted){
    const rStart=r.start_time.slice(0,5);
    const rEnd=r.end_time?r.end_time.slice(0,5):rStart;
    if(rStart>cursor)gaps.push({start:cursor,end:rStart});
    if(rEnd>cursor)cursor=rEnd;
  }
  if(cursor<dayEnd)gaps.push({start:cursor,end:dayEnd});
  return gaps;
}

async function saveEdit(){
  const date=document.getElementById('eDate').value;
  const start=document.getElementById('eStart').value;
  const end=document.getElementById('eEnd').value;
  const catId=document.getElementById('eCat').value;
  const note=getNoteValue('eNoteArea');
  if(!date||!start||!end){showToast('⚠️ 请填写完整');return;}
  const cat=categories.find(c=>c.id===catId);
  const crossDay=splitCrossDay(date,start,end);
  if(crossDay){
    if(!confirm('检测到跨天时间段，将拆分为两段保存，确认？'))return;
    await sbQuery(()=>sb.from('records').delete().eq('id',editingId));
    for(const seg of crossDay){
      await insertWithOverlapCheck(seg.date,seg.start,seg.end,catId,cat.name,note,null);
    }
    showToast('✅ 已拆分保存');
    closeModal('editModal');
    loadHistory();
    return;
  }
  if(end<=start){showToast('⚠️ 结束时间必须晚于开始时间');return;}
  const overlaps=await checkOverlap(date,start,end,editingId);
  if(overlaps.length>0){
    const choice=await showOverlapDialog(overlaps,start,end);
    if(choice==='cancel')return;
    if(choice==='new'){
      await resolveOverlapNewWins(overlaps,start,end);
    }else if(choice==='old'){
      const segs=resolveOverlapOldWins(overlaps,start,end);
      if(!segs.length){showToast('⚠️ 时间段被完全覆盖');return;}
      await sbQuery(()=>sb.from('records').update({date,start_time:segs[0].start,end_time:segs[0].end,duration_minutes:segs[0].mins,category_id:catId,category_name:cat.name,note}).eq('id',editingId));
      for(let i=1;i<segs.length;i++){
        await sbQuery(()=>sb.from('records').insert({date,start_time:segs[i].start,end_time:segs[i].end,duration_minutes:segs[i].mins,category_id:catId,category_name:cat.name,note,is_running:false}));
      }
      showToast('✅ 已保存');
      closeModal('editModal');
      loadHistory();
      return;
    }
  }
  await sbQuery(()=>sb.from('records').update({date,start_time:start,end_time:end,duration_minutes:Math.max(0,calcMins(start,end)),category_id:catId,category_name:cat.name,note}).eq('id',editingId));
  showToast('✅ 已保存');
  closeModal('editModal');
  loadHistory();
}

function switchStatTab(tab,btn){

  document.querySelectorAll('.stat-tab').forEach(b=>b.classList.remove('active'));

async function loadStats(){
  const now=new Date();
  let start,end,isSingleDay=false;
  if(currentStatTab==='day'){start=end=toDateStr(now);isSingleDay=true;}
  else if(currentStatTab==='week'){
    const d=new Date(now);
    d.setDate(d.getDate()-((d.getDay()+6)%7));
    start=toDateStr(d);
    const e=new Date(d);
    e.setDate(e.getDate()+6);
    end=toDateStr(e);
  }else if(currentStatTab==='month'){
    start=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
    end=toDateStr(new Date(now.getFullYear(),now.getMonth()+1,0));
  }else if(currentStatTab==='year'){
    start=now.getFullYear()+'-01-01';
    end=now.getFullYear()+'-12-31';
  }else if(currentStatTab==='pick'){
    const pv=document.getElementById('statPickDate').value;
    if(!pv){
      document.getElementById('statTotal').textContent='0m';
      document.getElementById('statCount').textContent='0';
      return;
    }
    start=end=pv;
    isSingleDay=true;
  }
  const{data}=await sbQuery(()=>sb.from('records').select('*').gte('date',start).lte('date',end).eq('is_running',false));
  const records=data||[];
  const total=records.reduce((s,r)=>s+(r.duration_minutes||0),0);
  document.getElementById('statTotal').textContent=total?fmtDur(total):'0m';
  document.getElementById('statCount').textContent=records.length;
  const catMap={};
  records.forEach(r=>{
    const cat=categories.find(c=>c.id===r.category_id)||{name:r.category_name||'未知',color:'#6366f1',icon:'📌'};
    const key=r.category_id||r.category_name;
    if(!catMap[key])catMap[key]={cat,mins:0,notes:{}};
    catMap[key].mins+=r.duration_minutes||0;
    const nk=(r.note&&r.note.trim())?r.note.trim():'（无备注）';
    catMap[key].notes[nk]=(catMap[key].notes[nk]||0)+(r.duration_minutes||0);
  });
  const catArr=Object.values(catMap).sort((a,b)=>b.mins-a.mins);
  const maxMins=catArr[0]?catArr[0].mins:1;
  window._catStatData=catArr;
  let html='';
  catArr.forEach(function(item,idx){
    const cat=item.cat,mins=item.mins,notes=item.notes;
    const noteArr=Object.entries(notes).sort((a,b)=>b[1]-a[1]);
    const pct=(mins/maxMins*100).toFixed(1);
    html+='<div class="cat-stat-item">'+
      '<div class="cat-stat-header" onclick="toggleNoteStats(\'ns-'+idx+'\',\'arr-'+idx+'\')">'+
        '<span style="font-size:20px;width:28px;text-align:center;">'+cat.icon+'</span>'+
        '<span style="font-size:13px;font-weight:600;min-width:48px;color:'+cat.color+';">'+cat.name+'</span>'+
        '<div class="cat-stat-bar-wrap"><div class="cat-stat-bar" style="width:'+pct+'%;background:'+cat.color+';"></div></div>'+
        '<span class="cat-stat-time">'+fmtDur(mins)+'</span>'+
        '<span class="cat-stat-arrow" id="arr-'+idx+'">▶</span>'+
      '</div>'+
      '<div class="note-stats" id="ns-'+idx+'">';
    html+='<div class="note-chart-wrap"><canvas id="nc-'+idx+'"></canvas></div>';
    noteArr.forEach(function(entry){
      const k=entry[0],v=entry[1];
      html+='<div class="note-stat-item">'+
        '<span class="note-stat-label">'+escHtml(k)+'</span>'+
        '<div class="note-stat-bar-wrap"><div class="note-stat-bar" style="width:'+(v/mins*100).toFixed(1)+'%;background:'+cat.color+';"></div></div>'+
        '<span class="note-stat-time">'+fmtDur(v)+'</span>'+
        '</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('catStats').innerHTML=html||'<div class="empty"><p>暂无数据</p></div>';
  if(pieChartInstance){pieChartInstance.destroy();pieChartInstance=null;}
  if(catArr.length&&total>0){
    pieChartInstance=new Chart(document.getElementById('pieChart'),{
      type:'doughnut',
      data:{labels:catArr.map(x=>x.cat.icon+' '+x.cat.name),datasets:[{data:catArr.map(x=>x.mins),backgroundColor:catArr.map(x=>x.cat.color),borderWidth:3,borderColor:'#fff',hoverOffset:10}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
        plugins:{legend:{position:'bottom',labels:{font:{size:11,weight:'600'},padding:14,boxWidth:10,boxHeight:10,usePointStyle:true,pointStyle:'circle'}},tooltip:{callbacks:{label:function(ctx){return ' '+fmtDur(ctx.raw)+'（'+(total>0?(ctx.raw/total*100).toFixed(1):0)+'%）';}}}}}
    });
  }
  let chartLabels=[],chartData=[],chartColors=[];
  if(isSingleDay){
    const hm={};
    records.forEach(r=>{const h=parseInt(r.start_time.slice(0,2));hm[h]=(hm[h]||0)+(r.duration_minutes||0);});
    for(let i=0;i<=23;i++){chartLabels.push(i+'');chartData.push(hm[i]||0);chartColors.push(i===now.getHours()?'#6366f1':'#c7d2fe');}
  }else if(currentStatTab==='week'){
    const dn=['一','二','三','四','五','六','日'],dm={};
    records.forEach(r=>{const d=new Date(r.date+'T12:00:00');const k=(d.getDay()+6)%7;dm[k]=(dm[k]||0)+(r.duration_minutes||0);});
    for(let i=0;i<7;i++){chartLabels.push('周'+dn[i]);chartData.push(+((dm[i]||0)/60).toFixed(1));chartColors.push(i===((now.getDay()+6)%7)?'#6366f1':'#c7d2fe');}
  }else if(currentStatTab==='month'){
    const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate(),dm={};
    records.forEach(r=>{const d=parseInt(r.date.split('-')[2]);dm[d]=(dm[d]||0)+(r.duration_minutes||0);});
    for(let i=1;i<=dim;i++){chartLabels.push(i+'');chartData.push(+((dm[i]||0)/60).toFixed(1));chartColors.push(i===now.getDate()?'#6366f1':'#c7d2fe');}
  }else{
    const mm={};
    records.forEach(r=>{const m=parseInt(r.date.split('-')[1])-1;mm[m]=(mm[m]||0)+(r.duration_minutes||0);});
    for(let i=0;i<12;i++){chartLabels.push((i+1)+'月');chartData.push(+((mm[i]||0)/60).toFixed(1));chartColors.push(i===now.getMonth()?'#6366f1':'#c7d2fe');}
  }
  if(barChartInstance){barChartInstance.destroy();barChartInstance=null;}
  barChartInstance=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:chartLabels,datasets:[{data:chartData,backgroundColor:chartColors,borderRadius:8,borderSkipped:false,maxBarThickness:32}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:0,color:'#94a3b8'}},y:{grid:{color:'#f1f5f9'},ticks:{font:{size:10},color:'#94a3b8'},beginAtZero:true}}}
  });
}

}

function removeCatNote(idx){
  editingCatNotes.splice(idx,1);
  renderEditCatNotes();
}

document.addEventListener('DOMContentLoaded',function(){
  const inp=document.getElementById('newCatNote');
  if(inp)inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addCatNote();}});
  const trInp=document.getElementById('timerRemarkInput');
  if(trInp)trInp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();saveTimerRemark();}});
});

async function saveEditCat(){
  const id=document.getElementById('editCatId').value;
  const name=document.getElementById('editCatName').value.trim();
  const icon=document.getElementById('editCatIcon').value.trim()||'📌';
  const color=document.getElementById('editCatColor').value;
  if(!name){showToast('⚠️ 请输入分类名称');return;}
  const{error}=await sbQuery(()=>sb.from('categories').update({name,icon,color,preset_notes:editingCatNotes}).eq('id',id));
  if(error){showToast('❌ 保存失败：'+error.message);return;}
  await sbQuery(()=>sb.from('records').update({category_name:name}).eq('category_id',id));
  showToast('✅ 分类已更新');
  closeModal('editCatModal');
  await loadCategories();
  renderCatManage();
}

async function addCategory(){
  const name=document.getElementById('newCatName').value.trim();
  const icon=document.getElementById('newCatIcon').value.trim()||'📌';
  const color=document.getElementById('newCatColor').value;
  if(!name){showToast('⚠️ 请输入分类名称');return;}
  const{error}=await sbQuery(()=>sb.from('categories').insert({name,icon,color,preset_notes:[]}));
  if(error){showToast('❌ 添加失败');return;}
  document.getElementById('newCatName').value='';
  document.getElementById('newCatIcon').value='';
  showToast('✅ 分类已添加');
  await loadCategories();
  renderCatManage();
}

async function deleteCategory(id){
  if(!confirm('删除此分类？相关记录不受影响'))return;
  await sbQuery(()=>sb.from('categories').delete().eq('id',id));
  await loadCategories();
  renderCatManage();
  showToast('🗑️ 已删除');
}

init();
</script>
</body>
</html>
