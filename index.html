<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>时间记录器</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="时间记录器">
<meta name="theme-color" content="#6366f1">
<link rel="apple-touch-icon" href="https://lazyman.yixiaai.com/files/493397/52b11d58-4025-4b5c-bfff-0f70aa9a2c2d.jpeg">
<link rel="icon" href="https://lazyman.yixiaai.com/files/493397/52b11d58-4025-4b5c-bfff-0f70aa9a2c2d.jpeg">
<script>
const manifest = {
  name: "时间记录器", short_name: "时间记录", start_url: location.href,
  display: "standalone", background_color: "#f0f4ff", theme_color: "#6366f1",
  icons: [{ src: "https://lazyman.yixiaai.com/files/493397/52b11d58-4025-4b5c-bfff-0f70aa9a2c2d.jpeg", sizes: "512x512", type: "image/jpeg", purpose: "any maskable" }]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
document.currentScript.after(link);
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f0f4ff; --card: #ffffff; --text: #1e293b; --sub: #64748b;
  --border: #e2e8f0; --primary: #6366f1; --radius: 16px;
  --shadow: 0 2px 16px rgba(99,102,241,0.10);
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 90px; }
.header { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); padding: 20px 20px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
.header h1 { font-size: 20px; font-weight: 700; color: white; display: flex; align-items: center; gap: 8px; }
.header .date { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 4px; }
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -4px 20px rgba(0,0,0,0.06); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 8px; font-size: 11px; color: #94a3b8; cursor: pointer; border: none; background: none; gap: 4px; transition: color 0.2s; }
.nav-btn.active { color: var(--primary); }
.nav-btn .nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.page { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
.page.active { display: block; }
.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.card-title { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
.running-card { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border-radius: var(--radius); padding: 24px 20px; margin-bottom: 12px; box-shadow: 0 8px 30px rgba(99,102,241,0.4); position: relative; overflow: hidden; }
.running-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 120px; height: 120px; background: rgba(255,255,255,0.08); border-radius: 50%; }
.running-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 10px; font-size: 12px; margin-bottom: 12px; }
.running-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)} }
.running-cat { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
.running-time { font-size: 52px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 3px; line-height: 1; margin-bottom: 8px; }
.running-start { font-size: 12px; opacity: 0.75; }
.stop-btn { margin-top: 18px; background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.5); color: white; padding: 13px; border-radius: 14px; font-size: 15px; font-weight: 600; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.stop-btn:active { background: rgba(255,255,255,0.35); }
.cats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.cat-btn { display: flex; flex-direction: column; align-items: center; padding: 16px 8px 12px; border-radius: 16px; border: none; cursor: pointer; transition: transform 0.15s; background: var(--bg); }
.cat-btn:active { transform: scale(0.92); }
.cat-icon { font-size: 28px; margin-bottom: 6px; }
.cat-name { font-size: 12px; font-weight: 600; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--sub); margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.form-input:focus { border-color: var(--primary); background: white; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 14px rgba(99,102,241,0.35); transition: opacity 0.2s, transform 0.15s; }
.btn-primary:active { opacity: 0.88; transform: scale(0.98); }
.note-input-wrap { position: relative; }
.note-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1.5px solid var(--primary); border-top: none; border-radius: 0 0 12px 12px; z-index: 50; max-height: 200px; overflow-y: auto; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
.note-suggestion-item { display: flex; align-items: center; padding: 10px 14px; cursor: pointer; gap: 8px; border-bottom: 1px solid var(--border); }
.note-suggestion-item:last-child { border-bottom: none; }
.note-suggestion-item:active { background: var(--bg); }
.note-suggestion-text { flex: 1; font-size: 14px; }
.note-suggestion-count { font-size: 11px; color: var(--sub); background: var(--bg); padding: 2px 7px; border-radius: 10px; }
.note-preset-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.note-tag { padding: 5px 12px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.15s; color: var(--text); }
.note-tag:active, .note-tag.selected { background: var(--primary); color: white; border-color: var(--primary); }
.record-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.record-item:last-child { border-bottom: none; }
.record-dot { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.record-info { flex: 1; min-width: 0; }
.record-cat { font-size: 14px; font-weight: 600; }
.record-time { font-size: 12px; color: var(--sub); margin-top: 2px; }
.record-note { font-size: 12px; color: var(--sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.record-dur { font-size: 13px; font-weight: 700; color: var(--primary); flex-shrink: 0; }
.record-actions { display: flex; gap: 4px; }
.btn-icon { background: var(--bg); border: none; cursor: pointer; padding: 6px; border-radius: 10px; font-size: 15px; transition: background 0.15s; }
.btn-icon:active { background: var(--border); }
.stat-tabs { display: flex; background: white; border-radius: 14px; padding: 4px; margin-bottom: 16px; box-shadow: var(--shadow); }
.stat-tab { flex: 1; text-align: center; padding: 9px 4px; border-radius: 11px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--sub); border: none; background: none; transition: all 0.2s; }
.stat-tab.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; box-shadow: 0 3px 10px rgba(99,102,241,0.35); }
.stat-summary { display: grid; grid-template-columns:1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: white; border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
.stat-val { font-size: 26px; font-weight: 800; color: var(--primary); }
.stat-lbl { font-size: 11px; color: var(--sub); margin-top: 3px; font-weight: 500; }
.chart-wrap { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
.chart-title { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.chart-inner { height: 180px; position: relative; }
.pie-wrap { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
.pie-inner { height: 200px; position: relative; }
.cat-stat-item { border-bottom: 1px solid var(--border); }
.cat-stat-item:last-child { border-bottom: none; }
.cat-stat-header { display: flex; align-items: center; gap: 10px; padding: 12px 0; cursor: pointer; user-select: none; }
.cat-stat-bar-wrap { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.cat-stat-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.cat-stat-time { font-size: 12px; font-weight: 700; color: var(--sub); min-width: 52px; text-align: right; }
.cat-stat-arrow { font-size: 11px; color: var(--sub); transition: transform 0.25s; flex-shrink: 0; margin-left: 2px; }
.cat-stat-arrow.open { transform: rotate(90deg); }
.note-stats { display: none; background: var(--bg); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.note-stats.open { display: block; }
.note-chart-wrap { height: 150px; position: relative; margin-bottom: 10px; }
.note-stat-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.note-stat-item:last-child { border-bottom: none; }
.note-stat-label { font-size: 12px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-stat-bar-wrap { width: 70px; height: 5px; background: white; border-radius: 3px; overflow: hidden; }
.note-stat-bar { height: 100%; border-radius: 3px; }
.note-stat-time { font-size: 11px; font-weight: 700; color: var(--sub); min-width: 44px; text-align: right; }
.export-btn { display: flex; align-items: center; gap: 14px; padding: 16px; background: white; border-radius: 14px; border: none; width: 100%; cursor: pointer; margin-bottom: 10px; box-shadow: var(--shadow); transition: transform 0.15s; }
.export-btn:active { transform: scale(0.98); }
.export-icon { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.export-name { font-size: 15px; font-weight: 600; text-align: left; }
.export-desc { font-size: 12px; color: var(--sub); margin-top: 2px; text-align: left; }
.toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #1e293b; color: white; padding: 12px 22px; border-radius: 14px; font-size: 14px; font-weight: 500; z-index: 9999; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
.toast.show { transform: translateX(-50%) translateY(0); }
.empty { text-align: center; padding: 40px 20px; color: var(--sub); }
.empty-icon { font-size: 44px; margin-bottom: 10px; }
.empty p { font-size: 14px; }
.loading { text-align: center; padding: 30px; color: var(--sub); font-size: 14px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(2px); }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal { background: white; border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%; max-height: 88vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1); }
.modal-overlay.show .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 18px; font-weight: 700; }
.modal-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--sub); }
select.form-input { appearance: none; -webkit-appearance: none; }
.cat-manage-item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.cat-manage-item:last-child { border-bottom: none; }
.cat-manage-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.cat-manage-name { flex: 1; font-size: 14px; font-weight: 600; }
.preset-note-item { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.preset-note-item:last-child { border-bottom: none; }
.preset-note-text { flex: 1; font-size: 14px; }
.preset-note-cat { font-size: 11px; color: var(--sub); background: var(--bg); padding: 2px 8px; border-radius: 10px; }
.fill-tip { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border: 1px solid #86efac; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; color: #166534; display: flex; align-items: center; gap: 8px; }
.cat-notes-section { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
.cat-notes-title { font-size: 11px; color: var(--sub); font-weight: 600; margin-bottom: 8px; }
.cat-note-tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.cat-note-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 20px; font-size: 12px; }
.cat-note-tag-del { color: #ef4444; cursor: pointer; font-size: 13px; line-height: 1; }
.cat-note-add-row { display: flex; gap: 6px; }
.cat-note-add-input { flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--bg); color: var(--text); outline: none; }
.cat-note-add-input:focus { border-color: var(--primary); }
.cat-note-add-btn { padding: 8px 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 13px; cursor: pointer; white-space: nowrap; }

/* 历史页日期选择器 */
.history-date-nav { display: flex; align-items: center; gap: 8px; background: white; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.history-date-selects { display: flex; gap: 6px; flex: 1; }
.history-date-selects select { flex: 1; padding: 8px 6px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--text); background: var(--bg); outline: none; appearance: none; -webkit-appearance: none; text-align: center; }
.history-date-selects select:focus { border-color: var(--primary); }
.history-nav-btn { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 16px; cursor: pointer; color: var(--sub); transition: all 0.15s; flex-shrink: 0; }
.history-nav-btn:active { background: var(--primary); color: white; border-color: var(--primary); }
.history-today-btn { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0; }

/* 重叠提示弹窗 */
.overlap-modal { position: fixed; inset: 0; background: rgba(15,23,42,0.6); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
.overlap-box { background: white; border-radius: 20px; padding: 24px 20px; max-width: 340px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.overlap-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
.overlap-desc { font-size: 13px; color: var(--sub); margin-bottom: 16px; line-height: 1.6; }
.overlap-btns { display: flex; flex-direction: column; gap: 8px; }
.overlap-btn { padding: 12px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 600; cursor: pointer; text-align: left; transition: all 0.15s; }
.overlap-btn:active { background: var(--primary); color: white; border-color: var(--primary); }
.overlap-btn-cancel { background: none; border: none; color: var(--sub); font-size: 13px; cursor: pointer; padding: 8px; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <h1>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    时间记录器
  </h1>
  <div class="date" id="headerDate"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 首页 -->
<div class="page active" id="page-home">
  <div id="runningCard"></div>
  <div class="card">
    <div class="card-title">⚡ 快速开始</div>
    <div class="cats-grid" id="catsGrid"></div>
  </div>
  <div class="card">
    <div class="card-title">✏️ 手动添加</div>
    <div class="form-group">
      <label class="form-label">日期</label>
      <input type="date" class="form-input" id="fDate">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">开始时间</label>
        <input type="time" class="form-input" id="fStart">
      </div>
      <div class="form-group">
        <label class="form-label">结束时间</label>
        <input type="time" class="form-input" id="fEnd">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">分类</label>
      <select class="form-input" id="fCat" onchange="renderNoteTagsFor('fNote','fCat')"></select>
    </div>
    <div class="form-group">
      <label class="form-label">备注（可选）</label>
      <div class="note-input-wrap">
        <input type="text" class="form-input" id="fNote" placeholder="输入或选择备注" autocomplete="off"
          oninput="showNoteSuggestions('fNote','fCat','fNoteSug')"
          onfocus="showNoteSuggestions('fNote','fCat','fNoteSug')">
        <div class="note-suggestions" id="fNoteSug" style="display:none;"></div>
      </div>
      <div class="note-preset-tags" id="fNoteTags"></div>
    </div>
    <button class="btn-primary" onclick="addRecord()">添加记录</button>
  </div>
</div>

<!-- 历史 -->
<div class="page" id="page-history">
  <!-- 新版日期导航 -->
  <div class="history-date-nav">
    <button class="history-nav-btn" onclick="historyDateShift(-1)">‹</button>
    <div class="history-date-selects">
      <select id="historyYear" onchange="onHistoryDateSelectChange()"></select>
      <select id="historyMonth" onchange="onHistoryDateSelectChange()"></select>
      <select id="historyDay" onchange="onHistoryDateSelectChange()"></select>
    </div>
    <button class="history-nav-btn" onclick="historyDateShift(1)">›</button>
    <button class="history-today-btn" onclick="historyGoToday()">今天</button>
  </div>
  <div id="fillTip"></div>
  <div id="historyList"></div>
</div>

<!-- 统计 -->
<div class="page" id="page-stats">
  <div class="stat-tabs">
    <button class="stat-tab active" onclick="switchStatTab('day',this)">今日</button>
    <button class="stat-tab" onclick="switchStatTab('week',this)">本周</button>
    <button class="stat-tab" onclick="switchStatTab('month',this)">本月</button>
    <button class="stat-tab" onclick="switchStatTab('year',this)">全年</button>
  </div>
  <div class="stat-summary">
    <div class="stat-card"><div class="stat-val" id="statTotal">0m</div><div class="stat-lbl">总时长</div></div>
    <div class="stat-card"><div class="stat-val" id="statCount">0</div><div class="stat-lbl">记录条数</div></div>
  </div>
  <div class="chart-wrap">
    <div class="chart-title">📊 时间分布</div>
    <div class="chart-inner"><canvas id="barChart"></canvas></div>
  </div>
  <div class="pie-wrap">
    <div class="chart-title">🥧 分类占比</div>
    <div class="pie-inner"><canvas id="pieChart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">📋 分类详情（点击展开备注统计）</div>
    <div id="catStats"></div>
  </div>
</div>

<!-- 更多 -->
<div class="page" id="page-export">
  <div class="card">
    <div class="card-title">📤 导出数据</div>
    <button class="export-btn" onclick="exportCSV()">
      <div class="export-icon" style="background:#dcfce7;">📊</div>
      <div><div class="export-name">导出 CSV</div><div class="export-desc">可用Excel / Numbers打开</div></div>
    </button>
    <button class="export-btn" onclick="exportJSON()">
      <div class="export-icon" style="background:#dbeafe;">📋</div>
      <div><div class="export-name">导出 JSON</div><div class="export-desc">完整数据备份</div></div>
    </button>
  </div>
  <div class="card">
    <div class="card-title">🏷️ 管理分类</div>
    <div id="catManageList"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <input type="text" class="form-input" id="newCatName" placeholder="分类名称" style="flex:1;">

const SUPABASE_URL = 'https://buyrevhbxypsekpmctmj.supabase.co';

let categories = [];

// ===== 工具函数 =====
function toDateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function nowTimeStr() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
function formatDateCN(d) {
  const days=['周日','周一','周二','周三','周四','周五','周六'];
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+days[d.getDay()];
}
function fmtDur(mins) {
  if (mins===null||mins===undefined||isNaN(mins)) return '-';
  mins = Math.max(0,Math.round(mins));
  if (mins<60) return mins+'分钟';
  const h=Math.floor(mins/60),m=mins%60;
  return m ? h+'h '+m+'m' : h+'h';
}
function fmtTime(t) { return t ? t.slice(0,5) : '--:--'; }
function calcMins(start,end) {
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  return (eh*60+em)-(sh*60+sm);
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function closeAllSuggestions() {

// ===== 初始化 =====
async function init() {
  const today = new Date();
  document.getElementById('headerDate').textContent = formatDateCN(today);
  document.getElementById('fDate').value = toDateStr(today);
  historyCurrentDate = new Date(today);
  initHistoryDateSelectors();
  await loadCategories();

  setInterval(checkDayChange, 60000);
}

// ===== 跨天检测 =====
let _lastDay = new Date().getDate();
function checkDayChange() {
  const now = new Date();
  if (now.getDate() !== _lastDay) {
    _lastDay = now.getDate();
    document.getElementById('headerDate').textContent = formatDateCN(now);
    document.getElementById('fDate').value = toDateStr(now);
    showToast('🌅 新的一天开始了');
    // 如果历史页显示的是昨天，自动跳到今天
    const histPage = document.getElementById('page-history');
    if (histPage.classList.contains('active')) {
      historyGoToday();
    }
  }
}

// ===== 历史页日期选择器 =====
function initHistoryDateSelectors() {
  const now = new Date();
  const yearSel = document.getElementById('historyYear');
  const monthSel = document.getElementById('historyMonth');
  const daySel = document.getElementById('historyDay');

  // 年份：近5年
  yearSel.innerHTML = '';
  for (let y = now.getFullYear(); y >= now.getFullYear()-4; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y+'年';
    if (y === historyCurrentDate.getFullYear()) opt.selected = true;
    yearSel.appendChild(opt);
  }

  // 月份
  monthSel.innerHTML = '';
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m+'月';
    if (m === historyCurrentDate.getMonth()+1) opt.selected = true;
    monthSel.appendChild(opt);
  }

  updateHistoryDaySelector();
}

function updateHistoryDaySelector() {
  const year = parseInt(document.getElementById('historyYear').value);
  const month = parseInt(document.getElementById('historyMonth').value);
  const daySel = document.getElementById('historyDay');
  const daysInMonth = new Date(year, month, 0).getDate();
  const currentDay = historyCurrentDate.getDate();

  daySel.innerHTML = '';
  for (let d = 1; d <= daysInMonth; d++) {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d+'日';
    if (d === Math.min(currentDay, daysInMonth)) opt.selected = true;
    daySel.appendChild(opt);
  }
}

function onHistoryDateSelectChange() {
  updateHistoryDaySelector();
  const y = parseInt(document.getElementById('historyYear').value);
  const m = parseInt(document.getElementById('historyMonth').value);
  const d = parseInt(document.getElementById('historyDay').value);
  historyCurrentDate = new Date(y, m-1, d);
  loadHistory();
}

function historyDateShift(delta) {
  historyCurrentDate.setDate(historyCurrentDate.getDate() + delta);
  syncHistorySelectors();
  loadHistory();
}

function historyGoToday() {
  historyCurrentDate = new Date();
  syncHistorySelectors();
  loadHistory();
}

function syncHistorySelectors() {
  const y = historyCurrentDate.getFullYear();
  const m = historyCurrentDate.getMonth()+1;
  const d = historyCurrentDate.getDate();
  const yearSel = document.getElementById('historyYear');
  // 如果年份不在选项里，重新初始化
  let found = false;
  for (let opt of yearSel.options) { if (parseInt(opt.value)===y) { opt.selected=true; found=true; break; } }
  if (!found) { initHistoryDateSelectors(); return; }
  document.getElementById('historyMonth').value = m;
  updateHistoryDaySelector();
  document.getElementById('historyDay').value = d;
}

async function showNoteSuggestions(noteInputId, catSelectId, sugId) {
  const input = document.getElementById(noteInputId);
  const sugEl = document.getElementById(sugId);
  const catId = document.getElementById(catSelectId) ? document.getElementById(catSelectId).value : '';

  let query = sb.from('records').select('note').eq('is_running',false);
  if (catId) query = query.eq('category_id', catId);
  const { data } = await query;
  const noteCount = {};
  (data||[]).forEach(r => {
    if (r.note && r.note.trim() && r.note.trim() !== '自动填充') {
      const k = r.note.trim();
      noteCount[k] = (noteCount[k]||0)+1;
    }
  });
  const cat = categories.find(c=>c.id===catId);
  const presets = (cat && cat.preset_notes) ? cat.preset_notes : [];
  presets.forEach(p => { if (!noteCount[p]) noteCount[p] = 0; });
  let items = Object.entries(noteCount).sort((a,b)=>b[1]-a[1]);
  if (val) items = items.filter(([k])=>k.toLowerCase().includes(val.toLowerCase()));
  if (!items.length) { sugEl.style.display='none'; return; }
  sugEl.style.display = 'block';
  sugEl.innerHTML = items.map(([k,cnt]) =>
    '<div class="note-suggestion-item" onclick="pickSuggestion(\''+noteInputId+'\',\''+sugId+'\',\''+escAttr(k)+'\')">' +

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/'/g,"\\'"); }

// ===== 计时器 =====
async function checkRunning() {
  const { data } = await sb.from('records').select('*').eq('is_running',true).maybeSingle();
  if (data) {
    runningRecord = data;
    const parts = data.start_time.slice(0,5).split(':').map(Number);
    const sd = new Date(data.date+'T00:00:00');
    sd.setHours(parts[0],parts[1],0,0);
    startTimestamp = sd.getTime();
    startTimer();
  }
}
async function quickStart(catId) {
  if (runningRecord) { showToast('⚠️ 请先停止当前计时'); return; }
  const cat = categories.find(c=>c.id===catId);
  const now = new Date();
  startTimestamp = now.getTime();
  const { data, error } = await sb.from('records').insert({
    date: toDateStr(now), start_time: nowTimeStr(),
    category_id: catId, category_name: cat.name, is_running: true
  }).select().single();
  if (error) { showToast('❌ 启动失败'); return; }
  runningRecord = data;
  startTimer();
  showToast('▶️ 开始：'+cat.icon+' '+cat.name);
}
function startTimer() {
  clearInterval(timerInterval);
  renderRunning();
  timerInterval = setInterval(renderRunning,1000);
}
function renderRunning() {
  const wrap = document.getElementById('runningCard');
  if (!runningRecord) { wrap.innerHTML=''; return; }

  const elapsed = Math.max(0,Math.floor((Date.now()-startTimestamp)/1000));

    '<div class="running-card">'+
    '<div class="running-badge"><div class="running-dot"></div>正在计时</div>'+

async function stopTimer() {
  if (!runningRecord) return;
  clearInterval(timerInterval);
  const elapsed = Math.floor((Date.now()-startTimestamp)/1000);
  const dur = Math.round(elapsed/60);
  await sb.from('records').update({
    end_time: nowTimeStr(), duration_minutes: Math.max(0,dur), is_running: false
  }).eq('id',runningRecord.id);

  runningRecord=null; startTimestamp=null;
  document.getElementById('runningCard').innerHTML='';
}

// ===== 功能1：跨天分割 =====
// 将一条跨天记录拆成两条，返回 [{date,start,end}, {date,start,end}]
function splitCrossDay(date, start, end) {
  // 判断是否跨天：end < start（比如 23:00 → 08:00 第二天）
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  const startMins = sh*60+sm;
  const endMins = eh*60+em;
  if (endMins >= startMins) return null; // 不跨天

  // 拆成两段
  const d1 = new Date(date+'T12:00:00');
  const d2 = new Date(d1); d2.setDate(d2.getDate()+1);
  return [
    { date: toDateStr(d1), start: start, end: '23:59' },
    { date: toDateStr(d2), start: '00:00', end: end }
  ];
}

// ===== 功能2：时间重叠检测 =====
async function checkOverlap(date, start, end, excludeId) {
  let query = sb.from('records').select('*').eq('date', date).eq('is_running', false);
  if (excludeId) query = query.neq('id', excludeId);
  const { data } = await query;
  if (!data || !data.length) return [];

  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  const newStart = sh*60+sm, newEnd = eh*60+em;

  return (data).filter(r => {
    if (!r.start_time || !r.end_time) return false;
    const [rs,rss] = r.start_time.slice(0,5).split(':').map(Number);
    const [re,rem] = r.end_time.slice(0,5).split(':').map(Number);
    const rStart = rs*60+rss, rEnd = re*60+rem;
    // 有重叠：新记录的开始 < 已有结束 且 新记录的结束 > 已有开始
    return newStart < rEnd && newEnd > rStart;
  });
}

// 重叠弹窗 Promise
function showOverlapDialog(overlaps, newStart, newEnd) {
  return new Promise(resolve => {
    const existing = overlaps.map(r =>
      `「${r.category_name}」${fmtTime(r.start_time)}~${fmtTime(r.end_time)}`
    ).join('、');

    const div = document.createElement('div');
    div.className = 'overlap-modal';
    div.innerHTML = `
      <div class="overlap-box">
        <div class="overlap-title">⚠️ 检测到时间重叠</div>
        <div class="overlap-desc">新记录（${newStart}~${newEnd}）与已有记录重叠：<br><strong>${existing}</strong><br><br>请选择处理方式：</div>
        <div class="overlap-btns">
          <button class="overlap-btn" id="ob-new">✅ 以新记录为准（裁剪已有记录）</button>
          <button class="overlap-btn" id="ob-old">📌 以已有记录为准（裁剪新记录）</button>
          <button class="overlap-btn" id="ob-keep">💾 直接保存（保留重叠）</button>
          <button class="overlap-btn-cancel" id="ob-cancel">取消</button>
        </div>
      </div>`;
    document.body.appendChild(div);

    div.querySelector('#ob-new').onclick = () => { document.body.removeChild(div); resolve('new'); };
    div.querySelector('#ob-old').onclick = () => { document.body.removeChild(div); resolve('old'); };
    div.querySelector('#ob-keep').onclick = () => { document.body.removeChild(div); resolve('keep'); };
    div.querySelector('#ob-cancel').onclick = () => { document.body.removeChild(div); resolve('cancel'); };
  });
}

// 处理重叠：裁剪已有记录
async function resolveOverlapNewWins(overlaps, newStart, newEnd) {
  const [sh,sm] = newStart.split(':').map(Number);
  const [eh,em] = newEnd.split(':').map(Number);
  const ns = sh*60+sm, ne = eh*60+em;

  for (const r of overlaps) {
    const [rs,rss] = r.start_time.slice(0,5).split(':').map(Number);
    const [re,rem] = r.end_time.slice(0,5).split(':').map(Number);
    const rStart = rs*60+rss, rEnd = re*60+rem;

    if (ns <= rStart && ne >= rEnd) {
      // 完全覆盖，删除
      await sb.from('records').delete().eq('id', r.id);
    } else if (ns <= rStart) {
      // 新记录在前，裁剪已有开始
      const newRStart = String(Math.floor(ne/60)).padStart(2,'0')+':'+String(ne%60).padStart(2,'0');
      await sb.from('records').update({ start_time: newRStart, duration_minutes: rEnd-ne }).eq('id', r.id);
    } else if (ne >= rEnd) {
      // 新记录在后，裁剪已有结束
      const newREnd = String(Math.floor(ns/60)).padStart(2,'0')+':'+String(ns%60).padStart(2,'0');
      await sb.from('records').update({ end_time: newREnd, duration_minutes: ns-rStart }).eq('id', r.id);
    } else {
      // 新记录在中间，将已有记录分成前后两段
      const newREnd = String(Math.floor(ns/60)).padStart(2,'0')+':'+String(ns%60).padStart(2,'0');
      const newRStart2 = String(Math.floor(ne/60)).padStart(2,'0')+':'+String(ne%60).padStart(2,'0');
      await sb.from('records').update({ end_time: newREnd, duration_minutes: ns-rStart }).eq('id', r.id);
      await sb.from('records').insert({
        date: r.date, start_time: newRStart2, end_time: r.end_time,
        duration_minutes: rEnd-ne, category_id: r.category_id,
        category_name: r.category_name, note: r.note, is_running: false
      });
    }
  }
}

// 处理重叠：裁剪新记录，返回裁剪后的时间段数组
function resolveOverlapOldWins(overlaps, newStart, newEnd) {
  const [sh,sm] = newStart.split(':').map(Number);
  const [eh,em] = newEnd.split(':').map(Number);
  let ns = sh*60+sm, ne = eh*60+em;

  // 将重叠区域从新记录中挖掉，返回剩余片段
  let segments = [{start: ns, end: ne}];
  for (const r of overlaps) {
    const [rs,rss] = r.start_time.slice(0,5).split(':').map(Number);
    const [re,rem] = r.end_time.slice(0,5).split(':').map(Number);
    const rStart = rs*60+rss, rEnd = re*60+rem;
    const newSegs = [];
    for (const seg of segments) {
      if (rStart <= seg.start && rEnd >= seg.end) continue; // 完全覆盖，丢弃
      if (rEnd <= seg.start || rStart >= seg.end) { newSegs.push(seg); continue; } // 无重叠
      if (rStart > seg.start) newSegs.push({start: seg.start, end: rStart});
      if (rEnd < seg.end) newSegs.push({start: rEnd, end: seg.end});
    }
    segments = newSegs;
  }
  return segments.filter(s => s.end - s.start > 0).map(s => ({
    start: String(Math.floor(s.start/60)).padStart(2,'0')+':'+String(s.start%60).padStart(2,'0'),
    end: String(Math.floor(s.end/60)).padStart(2,'0')+':'+String(s.end%60).padStart(2,'0'),
    mins: s.end - s.start
  }));
}

// ===== 手动添加（含跨天+重叠处理）=====
async function addRecord() {
  const date = document.getElementById('fDate').value;
  const start = document.getElementById('fStart').value;
  const end = document.getElementById('fEnd').value;
  const catId = document.getElementById('fCat').value;
  const note = document.getElementById('fNote').value;
  if (!date||!start||!end||!catId) { showToast('⚠️ 请填写完整信息'); return; }
  const cat = categories.find(c=>c.id===catId);

  // 功能1：检测跨天
  const crossDay = splitCrossDay(date, start, end);
  if (crossDay) {
    if (!confirm(`检测到跨天时间段（${start}~${end}），将自动拆分为：\n` +
      `① ${crossDay[0].date} ${crossDay[0].start}~${crossDay[0].end}\n` +
      `② ${crossDay[1].date} ${crossDay[1].start}~${crossDay[1].end}\n\n确认添加？`)) return;

    for (const seg of crossDay) {
      await insertWithOverlapCheck(seg.date, seg.start, seg.end, catId, cat.name, note, null);
    }
    showToast('✅ 已拆分为两段添加');
  } else {
    if (end <= start) { showToast('⚠️ 结束时间必须晚于开始时间'); return; }
    await insertWithOverlapCheck(date, start, end, catId, cat.name, note, null);
  }

  document.getElementById('fStart').value='';
  document.getElementById('fEnd').value='';
  document.getElementById('fNote').value='';
  document.querySelectorAll('#fNoteTags .note-tag').forEach(t=>t.classList.remove('selected'));
}

async function insertWithOverlapCheck(date, start, end, catId, catName, note, excludeId) {
  // 功能2：重叠检测
  const overlaps = await checkOverlap(date, start, end, excludeId);
  if (overlaps.length > 0) {
    const choice = await showOverlapDialog(overlaps, start, end);
    if (choice === 'cancel') return;
    if (choice === 'new') {
      await resolveOverlapNewWins(overlaps, start, end);
      await sb.from('records').insert({
        date, start_time: start, end_time: end,
        duration_minutes: calcMins(start, end),
        category_id: catId, category_name: catName, note, is_running: false
      });
      showToast('✅ 已添加（已裁剪冲突记录）');
    } else if (choice === 'old') {
      const segs = resolveOverlapOldWins(overlaps, start, end);
      if (!segs.length) { showToast('⚠️ 新记录被完全覆盖，未添加'); return; }
      for (const seg of segs) {
        await sb.from('records').insert({
          date, start_time: seg.start, end_time: seg.end,
          duration_minutes: seg.mins,
          category_id: catId, category_name: catName, note, is_running: false
        });
      }
      showToast('✅ 已添加（已避开冲突时段）');
    } else {
      // keep
      await sb.from('records').insert({
        date, start_time: start, end_time: end,
        duration_minutes: calcMins(start, end),
        category_id: catId, category_name: catName, note, is_running: false
      });
      showToast('✅ 添加成功');
    }
  } else {
    await sb.from('records').insert({
      date, start_time: start, end_time: end,
      duration_minutes: calcMins(start, end),
      category_id: catId, category_name: catName, note, is_running: false
    });
    showToast('✅ 添加成功');
  }
  loadHistory();
}

// ===== 历史记录 =====
async function loadHistory() {
  const date = toDateStr(historyCurrentDate);
  const list = document.getElementById('historyList');
  const tipEl = document.getElementById('fillTip');
  list.innerHTML = '<div class="loading">加载中...</div>';
  tipEl.innerHTML = '';

  const { data } = await sb.from('records').select('*')
    .eq('date', date).eq('is_running', false).order('start_time');

  // 判断是否是过去的日期
  const selDate = new Date(date+'T12:00:00');
  const todayMid = new Date(); todayMid.setHours(0,0,0,0);
  const isPast = selDate < todayMid;

  let filledRecords = data ? [...data] : [];

  // 功能3：只有没有正在计时的记录时才自动填充
  // 功能5：填充前检查是否已有自动填充记录（避免重复）
  if (isPast && data) {
    if (runningRecord) {
      // 有正在计时的记录，跳过自动填充
      tipEl.innerHTML = '<div class="fill-tip" style="background:linear-gradient(135deg,#fef9c3,#fef08a);border-color:#fde047;color:#854d0e;">⏳ 有计时进行中，自动填充将在计时结束后进行</div>';
    } else {
      // 检查是否已有自动填充记录
      const hasAutoFill = data.some(r => r.note === '自动填充');
      const gaps = findGaps(data, '00:00', '23:59').filter(g => calcMins(g.start, g.end) > 0);

      if (gaps.length > 0 && !hasAutoFill) {
        // 没有自动填充记录，且有空白，执行填充
        let otherCat = categories.find(c=>c.name==='其他');
        if (!otherCat) {
          const { data:nc } = await sb.from('categories').insert({name:'其他',icon:'⬜',color:'#94a3b8'}).select().single();
          if (nc) { categories.push(nc); otherCat=nc; renderCatsGrid(); renderCatSelect('fCat'); }
        }
        if (otherCat) {
          for (const gap of gaps) {
            await sb.from('records').insert({
              date, start_time: gap.start, end_time: gap.end,
              duration_minutes: calcMins(gap.start, gap.end),
              category_id: otherCat.id, category_name: '其他', note: '自动填充', is_running: false
            });
          }
          const { data:nd } = await sb.from('records').select('*')
            .eq('date', date).eq('is_running', false).order('start_time');
          filledRecords = nd || [];
          tipEl.innerHTML = '<div class="fill-tip">✅ 已自动用「其他」填充 '+gaps.length+' 段空白时间</div>';
        }
      } else if (gaps.length > 0 && hasAutoFill) {
        // 已有自动填充但还有空白（可能是手动删除了部分），不重复填充
        tipEl.innerHTML = '';
      }
    }
  }

  if (!filledRecords.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>这天暂无记录</p></div>';
    return;
  }
  const rows = filledRecords.map(r => {
    const cat = categories.find(c=>c.id===r.category_id)||{};
    const color = cat.color||'#6366f1';
    return '<div class="record-item">'+
      '<div class="record-dot" style="background:'+color+'20;">'+(cat.icon||'📌')+'</div>'+
      '<div class="record-info">'+
        '<div class="record-cat">'+r.category_name+'</div>'+
        '<div class="record-time">'+fmtTime(r.start_time)+' → '+fmtTime(r.end_time)+'</div>'+
        (r.note?'<div class="record-note">💬 '+escHtml(r.note)+'</div>':'')+
      '</div>'+
      '<div class="record-dur">'+fmtDur(r.duration_minutes)+'</div>'+
      '<div class="record-actions">'+
        '<button class="btn-icon" onclick="openEdit(\''+r.id+'\')">✏️</button>'+
        '<button class="btn-icon" onclick="deleteRecord(\''+r.id+'\')">🗑️</button>'+
      '</div></div>';
  }).join('');
  list.innerHTML = '<div class="card">'+rows+'</div>';
}

function findGaps(records, dayStart, dayEnd) {
  if (!records||!records.length) return [{start:dayStart,end:dayEnd}];
  const sorted = [...records].sort((a,b)=>a.start_time.localeCompare(b.start_time));
  const gaps = []; let cursor = dayStart;
  for (const r of sorted) {
    const rStart = r.start_time.slice(0,5);
    const rEnd = r.end_time ? r.end_time.slice(0,5) : rStart;
    if (rStart > cursor) gaps.push({start:cursor, end:rStart});
    if (rEnd > cursor) cursor = rEnd;
  }
  if (cursor < dayEnd) gaps.push({start:cursor, end:dayEnd});
  return gaps;
}

async function deleteRecord(id) {
  if (!confirm('确认删除这条记录？')) return;
  await sb.from('records').delete().eq('id',id);
  showToast('🗑️ 已删除'); loadHistory();
}

async function openEdit(id) {
  const { data } = await sb.from('records').select('*').eq('id',id).single();
  if (!data) return;
  editingId = id;
  document.getElementById('eDate').value = data.date;
  document.getElementById('eStart').value = data.start_time ? data.start_time.slice(0,5) : '';
  document.getElementById('eEnd').value = data.end_time ? data.end_time.slice(0,5) : '';
  document.getElementById('eNote').value = data.note||'';
  renderCatSelect('eCat');
  document.getElementById('eCat').value = data.category_id;
  renderNoteTagsFor('eNote','eCat');
  setTimeout(()=>{
    document.querySelectorAll('#eNoteTags .note-tag').forEach(t=>{
      t.classList.toggle('selected', t.textContent===(data.note||''));
    });
  },50);
  document.getElementById('editModal').classList.add('show');
}

async function saveEdit() {
  const date = document.getElementById('eDate').value;
  const start = document.getElementById('eStart').value;
  const end = document.getElementById('eEnd').value;
  const catId = document.getElementById('eCat').value;
  const note = document.getElementById('eNote').value;
  if (!date||!start||!end) { showToast('⚠️ 请填写完整'); return; }
  const cat = categories.find(c=>c.id===catId);

  // 功能1：检测跨天
  const crossDay = splitCrossDay(date, start, end);
  if (crossDay) {
    if (!confirm(`检测到跨天时间段，将拆分为两段保存，确认？`)) return;
    // 删除原记录
    await sb.from('records').delete().eq('id', editingId);
    for (const seg of crossDay) {
      await insertWithOverlapCheck(seg.date, seg.start, seg.end, catId, cat.name, note, null);
    }
    showToast('✅ 已拆分保存');
    closeModal('editModal'); loadHistory(); return;
  }

  if (end <= start) { showToast('⚠️ 结束时间必须晚于开始时间'); return; }

  // 功能2：重叠检测（排除自身）
  const overlaps = await checkOverlap(date, start, end, editingId);
  if (overlaps.length > 0) {
    const choice = await showOverlapDialog(overlaps, start, end);
    if (choice === 'cancel') return;
    if (choice === 'new') {
      await resolveOverlapNewWins(overlaps, start, end);
    } else if (choice === 'old') {
      const segs = resolveOverlapOldWins(overlaps, start, end);
      if (!segs.length) { showToast('⚠️ 时间段被完全覆盖'); return; }
      // 用第一段更新原记录，其余插入
      await sb.from('records').update({
        date, start_time: segs[0].start, end_time: segs[0].end,
        duration_minutes: segs[0].mins,
        category_id: catId, category_name: cat.name, note
      }).eq('id', editingId);
      for (let i=1; i<segs.length; i++) {
        await sb.from('records').insert({
          date, start_time: segs[i].start, end_time: segs[i].end,
          duration_minutes: segs[i].mins,
          category_id: catId, category_name: cat.name, note, is_running: false
        });
      }
      showToast('✅ 已保存'); closeModal('editModal'); loadHistory(); return;
    }
  }

  await sb.from('records').update({
    date, start_time: start, end_time: end,
    duration_minutes: Math.max(0, calcMins(start, end)),
    category_id: catId, category_name: cat.name, note
  }).eq('id', editingId);
  showToast('✅ 已保存');
  closeModal('editModal'); loadHistory();
}

// ===== 统计 =====
function switchStatTab(tab,btn) {
  currentStatTab=tab;
  document.querySelectorAll('.stat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); loadStats();
}
async function loadStats() {
  const now=new Date(); let start,end;
  if (currentStatTab==='day') { start=end=toDateStr(now); }
  else if (currentStatTab==='week') {
    const d=new Date(now); d.setDate(d.getDate()-((d.getDay()+6)%7)); start=toDateStr(d);
    const e=new Date(d); e.setDate(e.getDate()+6); end=toDateStr(e);
  } else if (currentStatTab==='month') {
    start=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
    end=toDateStr(new Date(now.getFullYear(),now.getMonth()+1,0));
  } else { start=now.getFullYear()+'-01-01'; end=now.getFullYear()+'-12-31'; }

  const { data } = await sb.from('records').select('*')
    .gte('date',start).lte('date',end).eq('is_running',false);
  const records=data||[];
  const total=records.reduce((s,r)=>s+(r.duration_minutes||0),0);
  document.getElementById('statTotal').textContent=total?fmtDur(total):'0m';
  document.getElementById('statCount').textContent=records.length;

  const catMap={};
  records.forEach(r=>{
    const cat=categories.find(c=>c.id===r.category_id)||{name:r.category_name||'未知',color:'#6366f1',icon:'📌'};
    const key=r.category_id||r.category_name;
    if (!catMap[key]) catMap[key]={cat,mins:0,notes:{}};
    catMap[key].mins+=r.duration_minutes||0;
    const nk=(r.note&&r.note.trim())?r.note.trim():'（无备注）';
    catMap[key].notes[nk]=(catMap[key].notes[nk]||0)+(r.duration_minutes||0);
  });
  const catArr=Object.values(catMap).sort((a,b)=>b.mins-a.mins);
  const maxMins=catArr[0]?catArr[0].mins:1;
  window._catStatData=catArr;

  let html='';
  catArr.forEach(function(item,idx){
    const cat=item.cat,mins=item.mins,notes=item.notes;
    const noteArr=Object.entries(notes).sort((a,b)=>b[1]-a[1]);
    const pct=(mins/maxMins*100).toFixed(1);
    html+='<div class="cat-stat-item">'+
      '<div class="cat-stat-header" onclick="toggleNoteStats(\'ns-'+idx+'\',\'arr-'+idx+'\')">'+
        '<span style="font-size:20px;width:28px;text-align:center;">'+cat.icon+'</span>'+
        '<span style="font-size:13px;font-weight:600;min-width:48px;color:'+cat.color+';">'+cat.name+'</span>'+
        '<div class="cat-stat-bar-wrap"><div class="cat-stat-bar" style="width:'+pct+'%;background:'+cat.color+';"></div></div>'+
        '<span class="cat-stat-time">'+fmtDur(mins)+'</span>'+
        '<span class="cat-stat-arrow" id="arr-'+idx+'">▶</span>'+
      '</div>'+
      '<div class="note-stats" id="ns-'+idx+'">'+
        '<div class="note-chart-wrap"><canvas id="nc-'+idx+'"></canvas></div>';
    noteArr.forEach(function(entry){
      const k=entry[0],v=entry[1];
      html+='<div class="note-stat-item">'+
        '<span class="note-stat-label">'+escHtml(k)+'</span>'+
        '<div class="note-stat-bar-wrap"><div class="note-stat-bar" style="width:'+(v/mins*100).toFixed(1)+'%;background:'+cat.color+';"></div></div>'+
        '<span class="note-stat-time">'+fmtDur(v)+'</span>'+
        '</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('catStats').innerHTML=html||'<div class="empty"><p>暂无数据</p></div>';

  if (pieChartInstance) { pieChartInstance.destroy(); pieChartInstance=null; }
  if (catArr.length&&total>0) {
    pieChartInstance=new Chart(document.getElementById('pieChart'),{
      type:'doughnut',
      data:{
        labels:catArr.map(function(x){return x.cat.icon+' '+x.cat.name;}),
        datasets:[{data:catArr.map(function(x){return x.mins;}),backgroundColor:catArr.map(function(x){return x.cat.color;}),borderWidth:3,borderColor:'#fff',hoverOffset:10}]
      },
      options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
        plugins:{legend:{position:'bottom',labels:{font:{size:11,weight:'600'},padding:14,boxWidth:10,boxHeight:10,usePointStyle:true,pointStyle:'circle'}},
        tooltip:{callbacks:{label:function(ctx){return ' '+fmtDur(ctx.raw)+'（'+(total>0?(ctx.raw/total*100).toFixed(1):0)+'%）';}}}}
      }
    });
  }

  let chartLabels=[],chartData=[],chartColors=[];
  if (currentStatTab==='day') {
    const hm={};
    records.forEach(r=>{const h=parseInt(r.start_time.slice(0,2));hm[h]=(hm[h]||0)+(r.duration_minutes||0);});
    for (let i=6;i<=23;i++){chartLabels.push(i+'');chartData.push(hm[i]||0);chartColors.push(i===now.getHours()?'#6366f1':'#c7d2fe');}
  } else if (currentStatTab==='week') {
    const dn=['一','二','三','四','五','六','日'],dm={};
    records.forEach(r=>{const d=new Date(r.date+'T12:00:00');const k=(d.getDay()+6)%7;dm[k]=(dm[k]||0)+(r.duration_minutes||0);});
    for (let i=0;i<7;i++){chartLabels.push('周'+dn[i]);chartData.push(+((dm[i]||0)/60).toFixed(1));chartColors.push(i===((now.getDay()+6)%7)?'#6366f1':'#c7d2fe');}
  } else if (currentStatTab==='month') {
    const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate(),dm={};
    records.forEach(r=>{const d=parseInt(r.date.split('-')[2]);dm[d]=(dm[d]||0)+(r.duration_minutes||0);});
    for (let i=1;i<=dim;i++){chartLabels.push(i+'');chartData.push(+((dm[i]||0)/60).toFixed(1));chartColors.push(i===now.getDate()?'#6366f1':'#c7d2fe');}
  } else {
    const mm={};
    records.forEach(r=>{const m=parseInt(r.date.split('-')[1])-1;mm[m]=(mm[m]||0)+(r.duration_minutes||0);});
    for (let i=0;i<12;i++){chartLabels.push((i+1)+'月');chartData.push(+((mm[i]||0)/60).toFixed(1));chartColors.push(i===now.getMonth()?'#6366f1':'#c7d2fe');}
  }

  if (barChartInstance){barChartInstance.destroy();barChartInstance=null;}
  barChartInstance=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:chartLabels,datasets:[{data:chartData,backgroundColor:chartColors,borderRadius:8,borderSkipped:false,maxBarThickness:32}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:0,color:'#94a3b8'}},
      y:{grid:{color:'#f1f5f9'},ticks:{font:{size:10},color:'#94a3b8'},beginAtZero:true}}}
  });
}

      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ' '+fmtDur(ctx.raw);}}}},
        scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#94a3b8'}},y:{grid:{color:'#f1f5f9'},ticks:{font:{size:10},color:'#94a3b8'},beginAtZero:true}}}
    });
  }
}

// ===== 导出 =====
async function exportCSV() {
  const { data } = await sb.from('records').select('*').eq('is_running',false).order('date').order('start_time');
  if (!data||!data.length){showToast('暂无数据');return;}
  const rows=[['日期','开始','结束','时长(分钟)','分类','备注']];
  data.forEach(r=>rows.push([r.date,fmtTime(r.start_time),fmtTime(r.end_time),r.duration_minutes||0,r.category_name||'',r.note||'']));
  const csv=rows.map(r=>r.map(v=>'"'+v+'"').join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='时间记录_'+toDateStr(new Date())+'.csv';a.click();
}
async function exportJSON() {
  const { data } = await sb.from('records').select('*').eq('is_running',false).order('date');
  if (!data||!data.length){showToast('暂无数据');return;}
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='时间记录_'+toDateStr(new Date())+'.json';a.click();
}

// ===== 分类管理 =====
function renderCatManage() {
  if (!categories.length) {
    document.getElementById('catManageList').innerHTML='<div style="color:var(--sub);font-size:13px;padding:10px 0;">暂无分类</div>';
    return;
  }
  let html='';
  categories.forEach(c=>{
    const noteCount=(c.preset_notes&&c.preset_notes.length)?c.preset_notes.length:0;
    html+='<div class="cat-manage-item">'+
      '<div class="cat-manage-icon" style="background:'+c.color+'20;">'+c.icon+'</div>'+
      '<span class="cat-manage-name">'+escHtml(c.name)+'</span>'+
      (noteCount?'<span style="font-size:11px;color:var(--sub);background:var(--bg);padding:2px 8px;border-radius:10px;margin-right:2px;">'+noteCount+'条备注</span>':'')+
      '<div style="width:14px;height:14px;border-radius:50%;background:'+c.color+';margin-right:2px;flex-shrink:0;"></div>'+
      '<button class="btn-icon" onclick="openEditCat(\''+c.id+'\')">✏️</button>'+
      '<button class="btn-icon" onclick="deleteCategory(\''+c.id+'\')">🗑️</button>'+
      '</div>';
  });
  document.getElementById('catManageList').innerHTML=html;
}

function openEditCat(id) {
  const cat=categories.find(c=>c.id===id);
  if (!cat) return;
  document.getElementById('editCatId').value=id;
  document.getElementById('editCatName').value=cat.name;
  document.getElementById('editCatIcon').value=cat.icon;
  document.getElementById('editCatColor').value=cat.color;
  editingCatNotes=(cat.preset_notes&&cat.preset_notes.length)?[...cat.preset_notes]:[];
  renderEditCatNotes();
  document.getElementById('newCatNote').value='';
  document.getElementById('editCatModal').classList.add('show');
}
function renderEditCatNotes() {
  const wrap=document.getElementById('editCatNoteList');
  if (!editingCatNotes.length) { wrap.innerHTML='<span style="font-size:12px;color:var(--sub);">暂无固定备注</span>'; return; }
  wrap.innerHTML=editingCatNotes.map((n,i)=>
    '<span class="cat-note-tag">'+escHtml(n)+'<span class="cat-note-tag-del" onclick="removeCatNote('+i+')">×</span></span>'
  ).join('');
}
function addCatNote() {
  const input=document.getElementById('newCatNote');
  const val=input.value.trim();
  if (!val){showToast('⚠️ 请输入备注内容');return;}
  if (editingCatNotes.includes(val)){showToast('⚠️ 已存在相同备注');return;}
  editingCatNotes.push(val); input.value=''; renderEditCatNotes();
}
function removeCatNote(idx) { editingCatNotes.splice(idx,1); renderEditCatNotes(); }

document.addEventListener('DOMContentLoaded',function(){
  const inp=document.getElementById('newCatNote');
  if (inp) inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addCatNote();}});
});

async function saveEditCat() {
  const id=document.getElementById('editCatId').value;
  const name=document.getElementById('editCatName').value.trim();
  const icon=document.getElementById('editCatIcon').value.trim()||'📌';
  const color=document.getElementById('editCatColor').value;
  if (!name){showToast('⚠️ 请输入分类名称');return;}
  const { error } = await sb.from('categories').update({name,icon,color,preset_notes:editingCatNotes}).eq('id',id);
  if (error){showToast('❌ 保存失败：'+error.message);return;}
  await sb.from('records').update({category_name:name}).eq('category_id',id);
  showToast('✅ 分类已更新');
  closeModal('editCatModal');
  await loadCategories(); renderCatManage();
}
async function addCategory() {
  const name=document.getElementById('newCatName').value.trim();
  const icon=document.getElementById('newCatIcon').value.trim()||'📌';
  const color=document.getElementById('newCatColor').value;
  if (!name){showToast('⚠️ 请输入分类名称');return;}
  const { error } = await sb.from('categories').insert({name,icon,color,preset_notes:[]});
  if (error){showToast('❌ 添加失败');return;}
  document.getElementById('newCatName').value=''; document.getElementById('newCatIcon').value='';
  showToast('✅ 分类已添加');
  await loadCategories(); renderCatManage();
}
async function deleteCategory(id) {
  if (!confirm('删除此分类？相关记录不受影响')) return;
  await sb.from('categories').delete().eq('id',id);
  await loadCategories(); renderCatManage(); showToast('🗑️ 已删除');
}

init();
</script>
